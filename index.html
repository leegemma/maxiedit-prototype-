    const textLabels = [...TEXT_LABELS_DEFAULT];

    const pageHome = document.getElementById('page-home');
    const pageEdit = document.getElementById('page-edit');
    const pageResult = document.getElementById('page-result');
    const texteditOverlay = document.getElementById('textedit-overlay');
    const btnStart = document.getElementById('btn-start');
    const btnEditClose = document.getElementById('btn-edit-close');
    const btnResetTop = document.getElementById('btn-reset-top');
    const btnNext = document.getElementById('btn-next');
    const btnClose = document.getElementById('btn-close');
    const btnDownload = document.getElementById('btn-download');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toast-text');
    const loadingBarEl = document.getElementById('loading-bar');
    const btnTextTool = document.getElementById('btn-text-tool');
    const btnTexteditCancel = document.getElementById('btn-textedit-cancel');
    const btnTexteditConfirm = document.getElementById('btn-textedit-confirm');
    // 12_result_single page refs
    const pageSingle = document.getElementById('page-single');
    const splitTrack = document.getElementById('split-track');
    const singleIndicator = document.getElementById('single-indicator');
    const btnSingleClose = document.getElementById('btn-single-close');
    const btnSingleDownload = document.getElementById('btn-single-download');
    const btnTextSingle = document.getElementById('btn-text-single');
    const btnFlip = document.getElementById('btn-flip');
    const resultIndicator = document.getElementById('result-indicator');
    const btnDownloadAll = document.getElementById('btn-download-all');
    const pickerGrid = document.getElementById('picker-grid');
    const photoInput = document.getElementById('photo-input');
    const previewGridEl = document.getElementById('preview-grid');
    const resultGridEl = document.getElementById('result-grid');
    const thumbsEl = document.getElementById('selected-thumbs');
    const texteditList = document.getElementById('textedit-list');
    const textareaEls = [
      document.getElementById('preview-textarea'),
      document.getElementById('result-textarea')
    ];

    const selected = [];

    const buildResultStyleGrid = (target, onCellClick) => {
      target.innerHTML = '';
      for (let r = 0; r < 3; r++) {
        const row = document.createElement('div');
        row.className = 'result-row';
        for (let c = 0; c < 3; c++) {
          const slotIndex = r * 3 + c;
          const cell = document.createElement('div');
          cell.className = 'result-cell';
          cell.dataset.slot = String(slotIndex);
          const section = document.createElement('div');
          section.className = 'p-section';
          section.dataset.slot = String(slotIndex);
          section.style.background = SLOT_COLORS[slotIndex];
          const title = document.createElement('p');
          title.className = 'photo-title';
          title.textContent = `(${slotIndex + 1})`;
          cell.appendChild(section);
          cell.appendChild(title);
          if (onCellClick) {
            cell.style.cursor = 'pointer';
            cell.addEventListener('click', () => onCellClick(slotIndex));
          }
          row.appendChild(cell);
        }
        target.appendChild(row);
      }
    };

    const buildPicker = () => {
      pickerGrid.innerHTML = '';
      if (photos.length === 0) {
        const empty = document.createElement('button');
        empty.type = 'button';
        empty.className = 'picker-empty';
        empty.innerHTML =
          '<span class="picker-empty-icon" aria-hidden="true">+</span>' +
          '<span class="picker-empty-text">탭하여 사진 or 영상 선택</span>';
        empty.addEventListener('click', () => photoInput.click());
        pickerGrid.appendChild(empty);
        return;
      }
      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.style.backgroundImage = `url("${photo.url}")`;
        item.dataset.index = String(i);
        if (photo.type === 'video') {
          const label = formatDuration(photo.duration);
          item.insertAdjacentHTML('beforeend', makeVideoBadgeHTML(label));
        }
        const icon = document.createElement('span');
        icon.className = 'icon-check off';
        icon.dataset.name = 'icon_check_off';
        item.appendChild(icon);
        item.addEventListener('click', () => togglePhoto(i));
        pickerGrid.appendChild(item);
      });
      // "+" tile at the end to append more photos/videos.
      const addBtn = document.createElement('button');
      addBtn.className = 'photo-item photo-item-add';
      addBtn.type = 'button';
      addBtn.textContent = '+';
      addBtn.setAttribute('aria-label', '사진/동영상 추가');
      addBtn.addEventListener('click', () => {
        photoInput.dataset.mode = 'append';
        photoInput.click();
      });
      pickerGrid.appendChild(addBtn);
    };

    const applyPhotoBg = (el, photoIdx) => {
      const photo = photos[photoIdx];
      if (!photo) return;
      el.style.backgroundImage = `url("${photo.url}")`;
      el.style.backgroundSize = 'cover';
      el.style.backgroundPosition = 'center';
      el.style.backgroundRepeat = 'no-repeat';
      el.style.backgroundColor = '';
    };
    const clearPhotoBg = (el, fallbackColor) => {
      el.style.backgroundImage = '';
      el.style.backgroundColor = fallbackColor || '';
    };

    const togglePhoto = (index) => {
      const pos = selected.indexOf(index);
      if (pos >= 0) {
        selected.splice(pos, 1);
        render();
      } else {
        if (selected.length >= MAX_SELECT) {
          showToast('최대 9개까지 선택할 수 있어요.', { showIcon: false });
          return;
        }
        selected.push(index);
        render();
        // bottom_layer_select shows 4 thumbs; from the 5th on, scroll the bar
        // so the newly added thumb is exposed at the right edge.
        requestAnimationFrame(() => {
          thumbsEl.scrollTo({ left: thumbsEl.scrollWidth, behavior: 'smooth' });
        });
      }
    };

    const renderGridSlots = (gridEl, { animateVideos = false } = {}) => {
      gridEl.querySelectorAll('.p-section').forEach((section) => {
        const slotIndex = Number(section.dataset.slot);
        const photoIdx = selected[slotIndex];
        const photo = photoIdx !== undefined ? photos[photoIdx] : null;

        // Always remove any prior video element — we rebuild based on current state.
        const priorVideo = section.querySelector('video');
        if (priorVideo) { try { priorVideo.pause(); } catch {} priorVideo.remove(); }

        if (!photo) {
          clearPhotoBg(section, SLOT_COLORS[slotIndex]);
          section.style.opacity = '0.7';
          return;
        }

        if (photo.type === 'video' && animateVideos && photo.originalUrl) {
          // Clean background; a <video> child plays the 2s loop on top.
          clearPhotoBg(section, '#000');
          const v = document.createElement('video');
          v.src = photo.originalUrl;
          v.muted = true;
          v.defaultMuted = true;
          v.playsInline = true;
          v.setAttribute('muted', '');
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.autoplay = true;
          v.loop = true;
          v.addEventListener('timeupdate', () => {
            if (v.currentTime >= VIDEO_CLIP_SECONDS) v.currentTime = 0;
          });
          section.appendChild(v);
          v.play().catch(() => { /* autoplay rejected is fine; shows first frame */ });
        } else {
          applyPhotoBg(section, photoIdx);
        }
        section.style.opacity = '1';
      });
    };

    const render = () => {
      // picker check icons — skip the trailing "+" tile which has no .icon-check
      pickerGrid.querySelectorAll('.photo-item:not(.photo-item-add)').forEach((item) => {
        const idx = Number(item.dataset.index);
        const selPos = selected.indexOf(idx);
        const icon = item.querySelector('.icon-check');
        if (selPos >= 0) {
          icon.classList.remove('off');
          icon.classList.add('on');
          icon.dataset.name = 'icon_check_on';
          icon.dataset.selectNumber = String(selPos + 1);
          icon.textContent = String(selPos + 1);
        } else {
          icon.classList.remove('on');
          icon.classList.add('off');
          icon.dataset.name = 'icon_check_off';
          delete icon.dataset.selectNumber;
          icon.textContent = '';
        }
      });

      renderGridSlots(previewGridEl);
      renderGridSlots(resultGridEl, { animateVideos: true });

      // bottom thumbs
      thumbsEl.innerHTML = '';
      selected.forEach((photoIdx, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        applyPhotoBg(thumb, photoIdx);
        thumb.dataset.photoIdx = String(photoIdx);
        if (photos[photoIdx] && photos[photoIdx].type === 'video') {
          thumb.insertAdjacentHTML('beforeend', makeVideoBadgeHTML(`${VIDEO_CLIP_SECONDS}s`));
        }
        const num = document.createElement('span');
        num.className = 'thumb-num';
        num.textContent = String(i + 1);
        const remove = document.createElement('button');
        remove.className = 'thumb-remove';
        remove.type = 'button';
        remove.setAttribute('aria-label', '선택 해제');
        remove.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 18 18 6M6 6l12 12"/></svg>';
        remove.addEventListener('click', (e) => {
          e.stopPropagation();
          togglePhoto(photoIdx);
        });
        thumb.appendChild(num);
        thumb.appendChild(remove);
        thumbsEl.appendChild(thumb);
      });

      // buttons
      const count = selected.length;
      btnNext.textContent = `다음 ${count}/${MAX_SELECT}`;
      btnNext.disabled = count === 0;
      btnResetTop.disabled = count === 0;

      // Keep result page indicator in sync with current selection count
      renderResultIndicator();
    };

    // Revoke the object URLs backing a photos[] entry.
    const revokeMedia = (p) => {
      if (p.url) URL.revokeObjectURL(p.url);
      if (p.originalUrl && p.originalUrl !== p.url) URL.revokeObjectURL(p.originalUrl);
    };

    // File type detection — iOS sometimes hands us a file with an empty MIME string,
    // so fall back to extension matching when `type` is missing.
    const isVideoFile = (f) =>
      (f.type && f.type.startsWith('video/')) ||
      /\.(mp4|mov|m4v|webm|avi|mkv|3gp)$/i.test(f.name || '');
    const isImageFile = (f) =>
      (f.type && f.type.startsWith('image/')) ||
      /\.(jpg|jpeg|png|gif|webp|heic|heif|bmp)$/i.test(f.name || '');

    // Load files from <input type="file"> into photos[] and rebuild the picker.
    // Supports both images and videos (videos get a first-frame thumbnail).
    // `append=true` keeps existing photos/selection and adds new ones at the end.
    const loadPhotoFiles = async (fileList, append = false) => {
      const files = Array.from(fileList || []);
      if (files.length === 0) return;
      if (!append) {
        photos.forEach(revokeMedia);
        photos.length = 0;
        selected.length = 0;
      }

      loadingBarEl.removeAttribute('hidden');
      let thumbFailures = [];
      let firstError = '';
      let oversized = 0;
      let toolong = 0;
      try {
        for (const f of files) {
          if (isVideoFile(f)) {
            if (f.size > MAX_VIDEO_SIZE_BYTES) { oversized++; continue; }
            try {
              const { thumbUrl, originalUrl, duration } = await generateVideoThumbnail(f);
              if (duration && duration > MAX_VIDEO_DURATION_S) {
                URL.revokeObjectURL(thumbUrl);
                URL.revokeObjectURL(originalUrl);
                toolong++;
                continue;
              }
              photos.push({ url: thumbUrl, originalUrl, name: f.name, type: 'video', duration });
            } catch (err) {
              console.warn('video thumbnail failed for', f.name, err);
              thumbFailures.push(f.name);
              if (!firstError) firstError = err && err.message ? err.message : String(err);
              // Still include the video with a placeholder thumbnail — the file is
              // there, it just didn't render a frame preview.
              const url = URL.createObjectURL(f);
              photos.push({
                url: VIDEO_FALLBACK_THUMB,
                originalUrl: url,
                name: f.name,
                type: 'video',
                duration: null,
              });
            }
          } else if (isImageFile(f)) {
            const url = URL.createObjectURL(f);
            photos.push({ url, originalUrl: url, name: f.name, type: 'image' });
          } else {
            console.warn('skipped file of unsupported type', f.name, f.type);
          }
        }
      } finally {
        loadingBarEl.setAttribute('hidden', '');
      }

      if (oversized) alert('너무 영상이 커서 넣을 수 없습니다.');
      if (toolong) alert('너무 긴 영상은 넣을 수 없습니다.');
      if (thumbFailures.length) {
        showToast(`썸네일 실패 ${thumbFailures.length}개 · ${firstError.slice(0, 40)}`);
      }
      buildPicker();
      render();
      renderResultIndicator();
    };

    // Result-page indicator: 1 dot for full_image + 1 per selected slot.
    const renderResultIndicator = () => {
      if (!resultIndicator) return;
      resultIndicator.innerHTML = '';
      if (selected.length === 0) return;
      const total = 1 + selected.length;
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'indicator-dot' + (i === 0 ? ' is-active' : '');
        dot.setAttribute('aria-label', i === 0 ? '전체 보기' : `${i}번째 보기`);
        dot.addEventListener('click', () => {
          if (i === 0) return;
          openSingle(i - 1);
        });
        resultIndicator.appendChild(dot);
      }
    };
    photoInput.addEventListener('change', (e) => {
      const mode = e.target.dataset.mode;
      loadPhotoFiles(e.target.files, mode === 'append');
      delete e.target.dataset.mode;
      e.target.value = '';
    });

    // Page navigation — only one page visible at a time.
    const pages = { home: pageHome, edit: pageEdit, result: pageResult, single: pageSingle };
    const bottomLayerSelectEl = document.querySelector('#page-edit .bottom-layer-select');
    let currentPage = 'home';

    // Lock page navigation + close buttons while a download is rendering.
    // Nesting-safe so downloadAllContent can wrap the per-slot helpers without
    // briefly unlocking between them.
    let isDownloading = false;
    let downloadDepth = 0;
    const navCloseButtons = [btnEditClose, btnClose, btnSingleClose];
    const setDownloadingState = (busy) => {
      if (busy) downloadDepth++;
      else downloadDepth = Math.max(0, downloadDepth - 1);
      isDownloading = downloadDepth > 0;
      navCloseButtons.forEach((b) => { if (b) b.disabled = isDownloading; });
    };

    const goTo = (name) => {
      if (!pages[name]) return;
      if (isDownloading) {
        showToast('다운로드 중에는 이동할 수 없어요.', { showIcon: false });
        return;
      }
      // Leaving the result page? Dismiss the textedit modal if it's up.
      if (currentPage === 'result' && name !== 'result') hideModal(texteditOverlay);
      Object.entries(pages).forEach(([k, el]) => {
        if (k === name) el.removeAttribute('hidden');
        else el.setAttribute('hidden', '');
      });
      currentPage = name;
      if (name === 'edit') {
        // Inertial slide-up for bottom_layer_select on every edit-page entry.
        if (bottomLayerSelectEl) {
          bottomLayerSelectEl.classList.remove('is-entering');
          // Force a reflow so the keyframe animation restarts even on repeat entries.
          void bottomLayerSelectEl.offsetWidth;
          bottomLayerSelectEl.classList.add('is-entering');
        }
        // Pre-populate the picker so the 최근항목 tab feels populated on entry —
        // no system picker pops up. The "+" tile inside the grid lets the user
        // append their own photos via the OS picker later.
        // PROTOTYPE: samples are canvas-generated. Replace with real PhotoKit
        // access via Capacitor/Cordova photo-library plugin in a future pass.
        if (photos.length === 0) {
          loadPrototypeRecentPhotos();
          buildPicker();
        }
      }
    };

    // Modal helpers — visibility is class-driven so backdrop + card can
    // transition in/out (see ".modal" CSS). The HTML `hidden` attr is only
    // present on initial markup; the first showModal call removes it and
    // we never re-add it. After that, .is-open alone controls visibility.
    const showModal = (el) => {
      el.removeAttribute('hidden');
      el.classList.add('is-open');
    };
    const hideModal = (el) => {
      el.classList.remove('is-open');
    };

    // Confirm dialog — promise-based, reused by X / reset on edit page.
    const confirmModal = document.getElementById('confirm-modal');
    const confirmTextEl = document.getElementById('confirm-text');
    const btnConfirmOk = document.getElementById('btn-confirm-ok');
    const btnConfirmCancel = document.getElementById('btn-confirm-cancel');
    let confirmResolver = null;
    const askConfirm = (message) => {
      confirmTextEl.textContent = message;
      showModal(confirmModal);
      return new Promise((resolve) => { confirmResolver = resolve; });
    };
    const settleConfirm = (result) => {
      hideModal(confirmModal);
      const r = confirmResolver;
      confirmResolver = null;
      if (r) r(result);
    };
    btnConfirmOk.addEventListener('click', () => settleConfirm(true));
    btnConfirmCancel.addEventListener('click', () => settleConfirm(false));
    confirmModal.addEventListener('click', (e) => {
      if (e.target === confirmModal) settleConfirm(false);
    });

    // Full reset — wipe loaded photos/videos and selections.
    const resetEditState = () => {
      photos.forEach(revokeMedia);
      photos.length = 0;
      selected.length = 0;
      buildPicker();
      render();
    };

    btnStart.addEventListener('click', () => goTo('edit'));

    // 00_home — tab toggle (홈 / 준비중). Toss-shopping-tab carousel:
    // both sections live in #home-tab-track and the track translates between
    // them. Tab data-tab values must match the track's expected data-active
    // values ("home" / "upcoming"). The same setActiveTab() runs from both
    // tab clicks and swipe-end so the visual + aria + indicator stay in sync.
    const homeTabs = document.querySelectorAll('#page-home .home-tab');
    const homeTabTrack = document.getElementById('home-tab-track');
    const homeTabOrder = ['home', 'upcoming'];
    // Pixel gutter between sections during swipe — must match the CSS `gap`
    // declared on `.home-tab-track-inner`. If you change one, change both.
    const HOME_TAB_GAP = 16;
    const setActiveTab = (target) => {
      homeTabs.forEach((t) => {
        const active = t.dataset.tab === target;
        t.classList.toggle('is-active', active);
        t.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      homeTabTrack.dataset.active = target;
    };
    homeTabs.forEach((tab) => {
      tab.addEventListener('click', () => setActiveTab(tab.dataset.tab));
    });

    // Touch swipe — drag the track horizontally with your finger; release
    // past 25% threshold (or with notable velocity) snaps to the next tab,
    // otherwise snaps back. Vertical scroll wins when the gesture starts
    // mostly vertical (axis lock decided on first meaningful move).
    let swipeStartX = null;
    let swipeStartY = null;
    let swipeStartTime = 0;
    let swipeBaseIdx = 0;     // 0 = home, 1 = upcoming
    let swipeAxis = null;     // null | 'h' | 'v'
    homeTabTrack.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
      swipeStartTime = performance.now();
      swipeBaseIdx = Math.max(0, homeTabOrder.indexOf(homeTabTrack.dataset.active || 'home'));
      swipeAxis = null;
    }, { passive: true });
    homeTabTrack.addEventListener('touchmove', (e) => {
      if (swipeStartX === null) return;
      const dx = e.touches[0].clientX - swipeStartX;
      const dy = e.touches[0].clientY - swipeStartY;
      if (swipeAxis === null) {
        if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
        swipeAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
        if (swipeAxis === 'h') homeTabTrack.style.transition = 'none';
      }
      if (swipeAxis !== 'h') return;
      // Pixel-based tracking so the gap between sections doesn't desync the
      // finger from the track. Step distance per tab = viewport + gap.
      const vw = homeTabTrack.parentElement.offsetWidth;
      const step = vw + HOME_TAB_GAP;
      const basePx = swipeBaseIdx * -step;
      let px = basePx + dx;
      const minPx = -(homeTabOrder.length - 1) * step;
      const maxPx = 0;
      // Rubber-band past the edges so the track doesn't slide off into nothing.
      if (px > maxPx) px = maxPx + (px - maxPx) * 0.3;
      else if (px < minPx) px = minPx + (px - minPx) * 0.3;
      homeTabTrack.style.transform = `translateX(${px}px)`;
    }, { passive: true });
    homeTabTrack.addEventListener('touchend', (e) => {
      if (swipeStartX === null) return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const elapsed = performance.now() - swipeStartTime;
      const wasHoriz = swipeAxis === 'h';
      swipeStartX = null;
      swipeStartY = null;
      swipeAxis = null;
      if (!wasHoriz) return;
      homeTabTrack.style.transition = '';
      homeTabTrack.style.transform = '';
      const vw = homeTabTrack.parentElement.offsetWidth;
      const ratio = dx / vw;
      const velocity = Math.abs(dx) / Math.max(1, elapsed); // px/ms
      const FLICK = velocity > 0.4 && Math.abs(dx) > 30;
      let newIdx = swipeBaseIdx;
      if ((ratio < -0.25 || (FLICK && dx < 0)) && newIdx < homeTabOrder.length - 1) newIdx++;
      else if ((ratio > 0.25 || (FLICK && dx > 0)) && newIdx > 0) newIdx--;
      const newTab = homeTabOrder[newIdx];
      if (newTab !== homeTabTrack.dataset.active) setActiveTab(newTab);
    });

    // 00_home — disabled cards (aria-disabled). Tap shows a "준비중" toast +
    // brief pulse so the surface still feels responsive.
    document.querySelectorAll('#page-home .home-card[aria-disabled="true"]').forEach((card) => {
      card.addEventListener('click', () => {
        showToast('준비 중이에요', { showIcon: false });
        card.classList.remove('home-card--pulse');
        void card.offsetWidth;
        card.classList.add('home-card--pulse');
      });
    });

    // 00_home — notification bell badge. setNotifCount(n) on the window so
    // it can be driven from a future data source; default 0 hides the dot.
    const notifBadgeEl = document.getElementById('notif-badge');
    window.setNotifCount = (n) => {
      const count = Math.max(0, Number(n) | 0);
      if (count <= 0) {
        notifBadgeEl.hidden = true;
        notifBadgeEl.textContent = '';
      } else {
        notifBadgeEl.hidden = false;
        notifBadgeEl.textContent = count > 99 ? '99+' : String(count);
      }
    };
    window.setNotifCount(3);
    btnEditClose.addEventListener('click', async () => {
      // Skip the prompt if there's nothing to lose.
      if (photos.length === 0 && selected.length === 0) {
        goTo('home');
        return;
      }
      const ok = await askConfirm('편집을 종료할까요?\n선택한 사진과 입력한 텍스트가\n모두 사라져요.');
      if (!ok) return;
      resetEditState();
      goTo('home');
    });
    btnResetTop.addEventListener('click', async () => {
      if (selected.length === 0) return;
      const ok = await askConfirm('선택한 사진을 모두 해제할까요?');
      if (!ok) return;
      selected.length = 0;
      render();
    });
    btnNext.addEventListener('click', () => {
      if (selected.length === 0) return;
      goTo('result');
    });
    btnClose.addEventListener('click', () => goTo('edit'));

    // Toast with check-mark draw animation. Pass { showIcon: false } for
    // info/warning messages where the green check is misleading.
    let toastHideTimer = null;
    let toastRemoveTimer = null;
    const toastCheckEl = toastEl.querySelector('.toast-check');
    const showToast = (msg = '저장 완료', { showIcon = true } = {}) => {
      toastTextEl.textContent = msg;
      if (toastCheckEl) toastCheckEl.style.display = showIcon ? '' : 'none';
      clearTimeout(toastHideTimer);
      clearTimeout(toastRemoveTimer);
      toastEl.classList.remove('is-open');
      toastEl.removeAttribute('hidden');
      // Force a reflow so the animation restarts on repeat triggers
      void toastEl.offsetWidth;
      toastEl.classList.add('is-open');
      toastHideTimer = setTimeout(() => {
        toastEl.classList.remove('is-open');
        toastRemoveTimer = setTimeout(() => toastEl.setAttribute('hidden', ''), 400);
      }, 2200);
    };

    const TARGET_WIDTH = 1080;          // bumped from 650 for sharper encoder input
    const SOURCE_WIDTH = 393;            // base design width — used for OUTPUT_HEIGHT and MP4 canvas
    const SOURCE_HEIGHT = 522;
    const SCALE_OUT = TARGET_WIDTH / SOURCE_WIDTH;
    const OUTPUT_HEIGHT = Math.round(SOURCE_HEIGHT * SCALE_OUT);
    // Encoder hint — MediaRecorder defaults wildly across browsers.
    const VIDEO_BITRATE = 6_000_000;    // 6 Mbps target

    // Share / anchor-download a Blob as a given file name.
    const saveBlob = async (blob, fileName) => {
      const file = new File([blob], fileName, { type: blob.type });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'MaxiEdit' });
          return true;
        } catch (err) {
          if (err && err.name === 'AbortError') return false; // user cancelled
          // other errors → fall through to anchor download
        }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      return true;
    };

    const tsNow = () => new Date().toISOString().replace(/[-:]/g, '').slice(0, 15);

    // Capture #page-result .full-image as a PNG at 650px wide.
    const capturePng = async () => {
      if (typeof html2canvas === 'undefined') throw new Error('html2canvas unavailable');
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      const fullImage = document.querySelector('#page-result .full-image');
      if (!fullImage) throw new Error('full-image not found');
      // TODO #10 — full-image renders at the actual frame width, not always 393.
      // Compute scale dynamically so the output canvas is always TARGET_WIDTH wide.
      const renderedWidth = fullImage.offsetWidth || SOURCE_WIDTH;
      const dynamicScale = TARGET_WIDTH / renderedWidth;
      const canvas = await html2canvas(fullImage, {
        scale: dynamicScale,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
      });
      return await new Promise((resolve, reject) => {
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('toBlob failed')), 'image/png');
      });
    };

    // Draw the full_image layout onto an arbitrary canvas context (used for MP4 frames).
    const drawImageCover = (ctx, img, x, y, w, h) => {
      const iw = img.videoWidth || img.naturalWidth || img.width;
      const ih = img.videoHeight || img.naturalHeight || img.height;
      if (!iw || !ih) return;
      const ratio = Math.max(w / iw, h / ih);
      const dw = iw * ratio;
      const dh = ih * ratio;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      try { ctx.drawImage(img, dx, dy, dw, dh); } catch {}
      ctx.restore();
    };
    const drawFullImageFrame = (ctx, w, h, slots) => {
      const s = w / SOURCE_WIDTH;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);

      const padX = 15 * s;
      const topPad = 15 * s;
      const rowGap = 31 * s;
      const slotH = 86 * s;
      const labelSize = 9 * s;
      const labelGap = 5 * s;
      const cellW = (w - 2 * padX) / 3;
      const rowStride = slotH + labelGap + labelSize + rowGap;

      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const idx = r * 3 + c;
          const x = padX + c * cellW;
          const y = topPad + r * rowStride;
          const slot = slots[idx];
          if (slot && slot.type === 'image' && slot.img) {
            drawImageCover(ctx, slot.img, x, y, cellW, slotH);
          } else if (slot && slot.type === 'video' && slot.videoEl) {
            drawImageCover(ctx, slot.videoEl, x, y, cellW, slotH);
          } else {
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = SLOT_COLORS[idx];
            ctx.fillRect(x, y, cellW, slotH);
            ctx.globalAlpha = 1;
          }
          ctx.fillStyle = '#000';
          ctx.font = `700 ${labelSize}px "Nanum Myeongjo", serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(`(${idx + 1})`, x + cellW / 2, y + slotH + labelGap);
        }
      }

      // Textarea legend (y=448 in source coordinates)
      const textY = 448 * s;
      const textSize = 8 * s;
      const lineH = 11 * s;
      ctx.font = `800 ${textSize}px "Nanum Myeongjo", serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#000';
      const colX1 = 13 * s;
      const colX2 = (13 + 91 + 17) * s;
      for (let i = 0; i < 9; i++) {
        const x = i < 4 ? colX1 : colX2;
        const row = i < 4 ? i : i - 4;
        ctx.fillText(`(${i + 1}) ${textLabels[i]}`, x, textY + row * lineH);
      }
    };

    const pickRecorderMime = () => {
      if (typeof MediaRecorder === 'undefined') return null;
      const candidates = [
        // High profile gets us better compression efficiency at higher resolution.
        'video/mp4;codecs=avc1.640029',
        'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
        'video/mp4;codecs=avc1.42E01E',
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm',
      ];
      return candidates.find((m) => { try { return MediaRecorder.isTypeSupported(m); } catch { return false; } }) || null;
    };

    // Lazy-load ffmpeg.wasm (single-threaded core) only when we need to transcode.
    let ffmpegLoadPromise = null;
    const loadFFmpeg = () => {
      if (ffmpegLoadPromise) return ffmpegLoadPromise;
      ffmpegLoadPromise = (async () => {
        const loadScript = (src) => new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = src;
          s.crossOrigin = 'anonymous';
          s.onload = res;
          s.onerror = () => rej(new Error('script load failed: ' + src));
          document.head.appendChild(s);
        });
        if (!window.FFmpegWASM) {
          await loadScript('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js');
        }
        if (!window.FFmpegUtil) {
          await loadScript('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js');
        }
        const ff = new window.FFmpegWASM.FFmpeg();
        await ff.load({
          coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
          wasmURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm',
        });
        return ff;
      })();
      return ffmpegLoadPromise;
    };

    // Transcode arbitrary MediaRecorder output to H.264 MP4 with no audio track.
    const transcodeToMp4 = async (srcBlob, srcMime) => {
      const ff = await loadFFmpeg();
      const { fetchFile } = window.FFmpegUtil;
      const srcExt = (srcMime && srcMime.includes('webm')) ? 'webm'
                    : (srcMime && srcMime.includes('mp4')) ? 'mp4'
                    : 'bin';
      const inputName = `in.${srcExt}`;
      await ff.writeFile(inputName, await fetchFile(srcBlob));
      // -an drops any audio the recorder picked up; -pix_fmt yuv420p for max
      // compatibility; -movflags faststart moves moov atom to the start so the
      // Photos app can scrub without having to download the whole file.
      // CRF 20 + high profile gives noticeably sharper output than the previous
      // veryfast/default settings without exploding the file size.
      await ff.exec(['-i', inputName, '-c:v', 'libx264', '-preset', 'fast',
                     '-profile:v', 'high', '-crf', '20',
                     '-pix_fmt', 'yuv420p', '-movflags', 'faststart', '-an',
                     'out.mp4']);
      const data = await ff.readFile('out.mp4');
      try { await ff.deleteFile(inputName); } catch {}
      try { await ff.deleteFile('out.mp4'); } catch {}
      return new Blob([data.buffer], { type: 'video/mp4' });
    };

    // Render an MP4 (or webm fallback, later transcoded) of the full_image
    // playing video slots for VIDEO_CLIP_SECONDS.
    // Output is always silent — canvas.captureStream has no audio track, and the
    // ffmpeg fallback also drops audio with -an.
    const captureMp4 = async () => {
      if (typeof MediaRecorder === 'undefined' || !HTMLCanvasElement.prototype.captureStream) {
        throw new Error('MediaRecorder/captureStream not supported');
      }
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      const mime = pickRecorderMime();
      if (!mime) throw new Error('no recorder codec');

      // Prepare slot resources.
      const slots = [];
      for (let i = 0; i < 9; i++) {
        const photoIdx = selected[i];
        const photo = photoIdx !== undefined ? photos[photoIdx] : null;
        if (!photo) { slots.push(null); continue; }
        if (photo.type === 'image') {
          const img = new Image();
          img.src = photo.url;
          try { await img.decode(); } catch {}
          slots.push({ type: 'image', img });
        } else if (photo.type === 'video' && photo.originalUrl) {
          const v = document.createElement('video');
          v.src = photo.originalUrl;
          v.muted = true;
          v.defaultMuted = true;
          v.playsInline = true;
          v.setAttribute('muted', '');
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.preload = 'auto';
          v.loop = true;
          v.style.cssText = 'position:fixed;top:0;left:0;width:64px;height:64px;opacity:0.001;pointer-events:none;z-index:-9999;';
          document.body.appendChild(v);
          await new Promise((res) => {
            const done = () => res();
            v.addEventListener('loadeddata', done, { once: true });
            v.addEventListener('error', done, { once: true });
            setTimeout(done, 3000);
          });
          v.currentTime = 0;
          try { await v.play(); } catch {}
          slots.push({ type: 'video', videoEl: v });
        } else {
          slots.push(null);
        }
      }

      // Canvas + recorder setup.
      const canvas = document.createElement('canvas');
      canvas.width = TARGET_WIDTH;
      canvas.height = OUTPUT_HEIGHT;
      const ctx = canvas.getContext('2d');
      // Draw the first frame (with text overlay) BEFORE the recorder starts so
      // chunk 0 is never blank. Draw twice across two frames to make sure every
      // layer — including the text — is composited before capture begins.
      drawFullImageFrame(ctx, canvas.width, canvas.height, slots);
      await new Promise((r) => requestAnimationFrame(r));
      drawFullImageFrame(ctx, canvas.width, canvas.height, slots);

      const stream = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: VIDEO_BITRATE });
      const chunks = [];
      recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };

      const cleanup = () => {
        slots.forEach((s) => {
          if (s && s.type === 'video') {
            try { s.videoEl.pause(); } catch {}
            if (s.videoEl.parentNode) s.videoEl.parentNode.removeChild(s.videoEl);
          }
        });
      };

      recorder.start();
      const startT = performance.now();

      return await new Promise((resolve, reject) => {
        recorder.onerror = (e) => { cleanup(); reject(new Error('recorder error')); };
        recorder.onstop = () => {
          cleanup();
          const blob = new Blob(chunks, { type: mime });
          resolve({ blob, mime });
        };

        const draw = () => {
          const elapsed = (performance.now() - startT) / 1000;
          slots.forEach((s) => {
            if (s && s.type === 'video' && s.videoEl.currentTime >= VIDEO_CLIP_SECONDS) {
              s.videoEl.currentTime = 0;
            }
          });
          drawFullImageFrame(ctx, canvas.width, canvas.height, slots);
          if (elapsed < VIDEO_CLIP_SECONDS) {
            requestAnimationFrame(draw);
          } else {
            try { recorder.stop(); } catch (err) { cleanup(); reject(err); }
          }
        };
        requestAnimationFrame(draw);
      });
    };

    const downloadPng = async () => {
      btnDownload.disabled = true;
      loadingBarEl.removeAttribute('hidden');
      setDownloadingState(true);
      try {
        const blob = await capturePng();
        const ok = await saveBlob(blob, `maxiedit_${tsNow()}.png`);
        if (ok) showToast('저장 완료');
      } catch (err) {
        console.error(err);
        alert('이미지 생성에 실패했습니다.');
      } finally {
        loadingBarEl.setAttribute('hidden', '');
        btnDownload.disabled = false;
        setDownloadingState(false);
      }
    };

    const downloadMp4 = async () => {
      btnDownload.disabled = true;
      loadingBarEl.removeAttribute('hidden');
      setDownloadingState(true);
      try {
        const { blob, mime } = await captureMp4();
        let finalBlob = blob;
        // Force an actual MP4 container. If MediaRecorder already gave us mp4
        // we pass through; otherwise transcode via ffmpeg.wasm.
        if (!mime || !mime.startsWith('video/mp4')) {
          showToast('MP4 변환 중…');
          finalBlob = await transcodeToMp4(blob, mime);
        }
        const ok = await saveBlob(finalBlob, `maxiedit_${tsNow()}.mp4`);
        if (ok) showToast('저장 완료');
      } catch (err) {
        console.error(err);
        alert('영상 생성에 실패했습니다.\n' + (err.message || err));
      } finally {
        loadingBarEl.setAttribute('hidden', '');
        btnDownload.disabled = false;
        setDownloadingState(false);
      }
    };

    // Download button: open chooser. Options PNG / MP4 / 모두 저장 / 취소.
    const downloadModal = document.getElementById('download-modal');
    const btnDownloadPng = document.getElementById('btn-download-png');
    const btnDownloadMp4 = document.getElementById('btn-download-mp4');
    const btnDownloadCancel = document.getElementById('btn-download-cancel');
    const openDownloadModal = () => {
      if (selected.length === 0) return;
      showModal(downloadModal);
    };
    btnDownload.addEventListener('click', openDownloadModal);
    // PNG: use full-page PNG when on 10_result, single-slide PNG when on 12_single
    btnDownloadPng.addEventListener('click', () => {
      hideModal(downloadModal);
      if (currentPage === 'single') downloadSinglePng();
      else downloadPng();
    });
    btnDownloadMp4.addEventListener('click', () => {
      hideModal(downloadModal);
      if (currentPage === 'single') downloadSingleMp4();
      else downloadMp4();
    });
    btnDownloadAll.addEventListener('click', () => {
      hideModal(downloadModal);
      downloadAllContent();
    });
    btnDownloadCancel.addEventListener('click', () => hideModal(downloadModal));
    downloadModal.addEventListener('click', (e) => { if (e.target === downloadModal) hideModal(downloadModal); });

    // Save every output in one sweep. The full 10_result is saved as PNG when
    // there are no video selections, otherwise as MP4. Each 12_single slide is
    // saved as PNG if that slot is an image, MP4 if it's a video.
    const downloadAllContent = async () => {
      if (selected.length === 0) return;
      const anyVideo = selected.some((i) => photos[i] && photos[i].type === 'video');
      setDownloadingState(true);
      try {
        try {
          if (anyVideo) await downloadMp4();
          else await downloadPng();
        } catch (err) { console.warn('full save failed', err); }
        for (let i = 0; i < selected.length; i++) {
          const photoIdx = selected[i];
          const slotIsVideo = photos[photoIdx] && photos[photoIdx].type === 'video';
          currentSingleIdx = i;
          try {
            if (slotIsVideo) await downloadSingleMp4();
            else await downloadSinglePng();
          } catch (err) { console.warn(`slide ${i} save failed`, err); }
        }
        showToast('전체 저장 완료');
      } finally {
        setDownloadingState(false);
      }
    };

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      // Close the top-most modal first; only one Esc press per modal.
      // Order matches z-order: confirm sits above textedit/download in user flow.
      if (confirmModal.classList.contains('is-open')) { settleConfirm(false); return; }
      if (texteditOverlay.classList.contains('is-open')) { closeTextedit(); return; }
      if (downloadModal.classList.contains('is-open')) { hideModal(downloadModal); return; }
    });

    document.querySelectorAll('.cat-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.cat-tab').forEach((t) => t.classList.remove('is-active'));
        tab.classList.add('is-active');
      });
    });

    const renderTextareas = () => {
      textareaEls.forEach((ta) => {
        if (!ta) return;
        ta.innerHTML = '';
        const leftCol = document.createElement('div');
        const rightCol = document.createElement('div');
        for (let i = 0; i < 9; i++) {
          const p = document.createElement('p');
          p.textContent = `(${i + 1}) ${textLabels[i]}`;
          (i < 4 ? leftCol : rightCol).appendChild(p);
        }
        ta.appendChild(leftCol);
        ta.appendChild(rightCol);
      });
    };

    // filterIdx: null = all 9 rows, otherwise just that single row.
    const openTextedit = (filterIdx = null) => {
      texteditList.innerHTML = '';
      textLabels.forEach((label, i) => {
        if (filterIdx !== null && i !== filterIdx) return;
        const row = document.createElement('div');
        row.className = 'textedit-row';
        const num = document.createElement('span');
        num.className = 'textedit-num';
        num.textContent = `(${i + 1})`;
        const input = document.createElement('input');
        input.className = 'textedit-input';
        input.type = 'text';
        input.value = label;
        input.dataset.index = String(i);
        input.setAttribute('autocomplete', 'off');
        input.setAttribute('autocorrect', 'off');
        input.setAttribute('autocapitalize', 'off');
        row.appendChild(num);
        row.appendChild(input);
        texteditList.appendChild(row);
      });
      showModal(texteditOverlay);
    };

    const closeTextedit = () => hideModal(texteditOverlay);

    const confirmTextedit = () => {
      texteditList.querySelectorAll('.textedit-input').forEach((input) => {
        const idx = Number(input.dataset.index);
        textLabels[idx] = input.value;
      });
      renderTextareas();
      // If we're inside the single view, update just the affected slide's text
      // in place (avoids rebuilding the scroll track / losing flip state).
      if (currentPage === 'single') {
        splitTrack.querySelectorAll('.split-slide').forEach((slide) => {
          const i = Number(slide.dataset.idx);
          const txt = slide.querySelector('.split-text');
          if (txt) txt.textContent = textLabels[i] || '';
        });
      }
      closeTextedit();
    };

    // 12_result_single — state + rendering. One .split-slide per selected slot.
    // Each slide scroll-snaps full width; iOS momentum scrolling handles the slide feel.
    let currentSingleIdx = 0;

    // Pause videos that scrolled off-screen so 9 videos don't all decode at once.
    // The observer is attached after the page is shown (root must be visible to
    // produce useful intersection ratios on iOS).
    const singleVideoObserver = ('IntersectionObserver' in window)
      ? new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            const v = entry.target;
            if (entry.isIntersecting) {
              v.play().catch(() => {});
            } else {
              try { v.pause(); } catch {}
            }
          });
        }, { root: splitTrack, threshold: 0.5 })
      : null;

    const buildSingleSlides = () => {
      if (singleVideoObserver) singleVideoObserver.disconnect();
      splitTrack.innerHTML = '';
      selected.forEach((photoIdx, i) => {
        const slide = document.createElement('div');
        slide.className = 'split-slide';
        slide.dataset.idx = String(i);

        const image = document.createElement('div');
        image.className = 'split-image';
        const text = document.createElement('div');
        text.className = 'split-text';
        text.textContent = textLabels[i] || '';
        text.addEventListener('click', () => openTextedit(i));

        const photo = photos[photoIdx];
        if (photo) {
          if (photo.type === 'video' && photo.originalUrl) {
            const v = document.createElement('video');
            v.src = photo.originalUrl;
            v.muted = true;
            v.defaultMuted = true;
            v.playsInline = true;
            v.setAttribute('muted', '');
            v.setAttribute('playsinline', '');
            v.setAttribute('webkit-playsinline', '');
            v.loop = true;
            v.addEventListener('timeupdate', () => {
              if (v.currentTime >= VIDEO_CLIP_SECONDS) v.currentTime = 0;
            });
            image.appendChild(v);
            // Observer drives play/pause based on visibility. Fall back to
            // autoplay when IntersectionObserver isn't available.
            if (singleVideoObserver) {
              singleVideoObserver.observe(v);
            } else {
              v.autoplay = true;
              v.play().catch(() => {});
            }
          } else {
            const img = document.createElement('img');
            img.src = photo.url;
            img.alt = '';
            image.appendChild(img);
          }
        }

        slide.appendChild(image);
        slide.appendChild(text);
        splitTrack.appendChild(slide);
      });
    };

    const renderSingleIndicator = () => {
      singleIndicator.innerHTML = '';
      // Leftmost dot mirrors 10_result's indicator — tapping it returns to the full view.
      const backDot = document.createElement('button');
      backDot.type = 'button';
      backDot.className = 'indicator-dot';
      backDot.setAttribute('aria-label', '전체 보기로');
      backDot.addEventListener('click', () => goTo('result'));
      singleIndicator.appendChild(backDot);
      selected.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'indicator-dot' + (i === currentSingleIdx ? ' is-active' : '');
        dot.setAttribute('aria-label', `${i + 1}번째`);
        dot.addEventListener('click', () => scrollSingleTo(i, true));
        singleIndicator.appendChild(dot);
      });
    };

    const scrollSingleTo = (idx, smooth = false) => {
      const w = splitTrack.clientWidth;
      splitTrack.scrollTo({ left: idx * w, behavior: smooth ? 'smooth' : 'auto' });
    };

    const renderSingleView = () => {
      if (selected.length === 0) return;
      if (currentSingleIdx >= selected.length) currentSingleIdx = selected.length - 1;
      buildSingleSlides();
      renderSingleIndicator();
      // Jump to the current slide (no animation — initial render)
      requestAnimationFrame(() => scrollSingleTo(currentSingleIdx, false));
    };

    const openSingle = (slotIdx) => {
      if (selected.length === 0) return;
      if (slotIdx === undefined || slotIdx < 0 || slotIdx >= selected.length) slotIdx = 0;
      currentSingleIdx = slotIdx;
      goTo('single');
      renderSingleView();
    };

    // Update indicator as the user swipes between slides.
    let singleScrollTimer = null;
    splitTrack.addEventListener('scroll', () => {
      clearTimeout(singleScrollTimer);
      singleScrollTimer = setTimeout(() => {
        const w = splitTrack.clientWidth;
        if (!w) return;
        const newIdx = Math.round(splitTrack.scrollLeft / w);
        if (newIdx !== currentSingleIdx && newIdx >= 0 && newIdx < selected.length) {
          currentSingleIdx = newIdx;
          renderSingleIndicator();
        }
      }, 60);
    }, { passive: true });

    // Rightward swipe at the leftmost slide = go back to 10_result (mirrors the
    // leftmost indicator click behavior, but as a swipe gesture).
    let singleTouchStartX = null;
    splitTrack.addEventListener('touchstart', (e) => {
      singleTouchStartX = (splitTrack.scrollLeft === 0) ? e.touches[0].clientX : null;
    }, { passive: true });
    splitTrack.addEventListener('touchend', (e) => {
      if (singleTouchStartX === null) return;
      const dx = e.changedTouches[0].clientX - singleTouchStartX;
      singleTouchStartX = null;
      if (isDownloading) return;
      if (dx > 80 && splitTrack.scrollLeft === 0) goTo('result');
    }, { passive: true });

    btnSingleClose.addEventListener('click', () => goTo('result'));
    btnFlip.addEventListener('click', () => {
      const slide = splitTrack.children[currentSingleIdx];
      if (slide) slide.classList.toggle('is-flipped');
    });
    btnTextSingle.addEventListener('click', () => openTextedit(currentSingleIdx));

    // --- single-slide export helpers ---

    // Paint the split-slide layout (image/video half + text half, respecting flip) onto
    // an arbitrary 2D canvas context. Used by MP4 and GIF export paths.
    const drawSingleFrame = (ctx, w, h, slide) => {
      // 1080×1434 canvas split 50/50 horizontally — same proportions as the
      // on-screen split-slide (which is 393×522 with image and text panels
      // each 50%). Honors slide.flipped.
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      const halfH = Math.floor(h / 2);
      const imgY = slide.flipped ? halfH : 0;
      const textY = slide.flipped ? 0 : halfH;
      if (slide.type === 'video' && slide.videoEl && slide.videoEl.videoWidth > 0 && slide.videoEl.videoHeight > 0 && slide.videoEl.readyState >= 2) {
        drawImageCover(ctx, slide.videoEl, 0, imgY, w, halfH);
      } else if ((slide.type === 'video' || slide.type === 'image') && slide.img) {
        drawImageCover(ctx, slide.img, 0, imgY, w, halfH);
      } else {
        ctx.fillStyle = '#ffefb7';
        ctx.fillRect(0, imgY, w, halfH);
      }
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, textY, w, halfH);
      ctx.fillStyle = '#000';
      const fontSize = Math.round(w * 0.045);
      ctx.font = `700 ${fontSize}px "Nanum Myeongjo", serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(slide.text || '', w / 2, textY + halfH / 2);
    };

    // Build a slide descriptor (image or video element) for the current single slot.
    const prepareSingleSlideForExport = async () => {
      const photoIdx = selected[currentSingleIdx];
      const photo = photos[photoIdx];
      const text = textLabels[currentSingleIdx] || '';
      const slideEl = splitTrack.children[currentSingleIdx];
      const flipped = slideEl ? slideEl.classList.contains('is-flipped') : false;
      if (!photo) return { type: 'empty', text, flipped, cleanup: () => {} };
      if (photo.type === 'image') {
        const img = new Image();
        img.src = photo.url;
        try { await img.decode(); } catch {}
        return { type: 'image', img, text, flipped, cleanup: () => {} };
      }
      // Always load the still thumbnail so we have a guaranteed fallback even when
      // the live video element fails to decode frames into a canvas.
      let thumbImg = null;
      try {
        const i = new Image();
        i.src = photo.url;
        await i.decode();
        thumbImg = i;
      } catch {}

      const v = document.createElement('video');
      v.src = photo.originalUrl;
      v.muted = true;
      v.defaultMuted = true;
      v.playsInline = true;
      v.setAttribute('muted', '');
      v.setAttribute('playsinline', '');
      v.setAttribute('webkit-playsinline', '');
      v.preload = 'auto';
      v.loop = true;
      // Visible-but-tiny: zero-opacity hidden videos sometimes get throttled and
      // never decode frames on iOS, leaving the upper canvas half empty.
      v.style.cssText = 'position:fixed;left:0;top:0;width:160px;height:160px;opacity:0.01;pointer-events:none;z-index:-9999;';
      document.body.appendChild(v);
      await new Promise((res) => {
        const done = () => res();
        v.addEventListener('canplay', done, { once: true });
        v.addEventListener('loadeddata', done, { once: true });
        v.addEventListener('error', done, { once: true });
        setTimeout(done, 5000);
      });
      v.currentTime = 0.04;
      await new Promise((res) => {
        v.addEventListener('seeked', res, { once: true });
        setTimeout(res, 800);
      });
      try { await v.play(); } catch {}
      // Give the decoder a few frames to actually paint before we start sampling.
      await new Promise((r) => setTimeout(r, 200));
      return {
        type: 'video',
        videoEl: v,
        img: thumbImg,
        text,
        flipped,
        cleanup: () => {
          try { v.pause(); } catch {}
          if (v.parentNode) v.parentNode.removeChild(v);
        },
      };
    };

    // Single output dimensions — both PNG and MP4 use these so video and photo
    // exports come out at exactly the same pixel size. Matches 10_result's
    // 1080×1434 (393:522 aspect) so single and full exports share dimensions.
    const SINGLE_OUT_W = 1080;
    const SINGLE_OUT_H = 1434;

    // Single PNG — paint the split layout onto a fresh canvas (same code path
    // as the MP4 export, just one frame). This excludes the on-screen 20%
    // viewport margin from the output, as requested.
    const downloadSinglePng = async () => {
      btnSingleDownload.disabled = true;
      loadingBarEl.removeAttribute('hidden');
      setDownloadingState(true);
      try {
        if (document.fonts && document.fonts.ready) await document.fonts.ready;
        const slide = await prepareSingleSlideForExport();
        const canvas = document.createElement('canvas');
        canvas.width = SINGLE_OUT_W;
        canvas.height = SINGLE_OUT_H;
        const ctx = canvas.getContext('2d');
        drawSingleFrame(ctx, canvas.width, canvas.height, slide);
        await new Promise((r) => requestAnimationFrame(r));
        drawSingleFrame(ctx, canvas.width, canvas.height, slide);
        slide.cleanup();
        const blob = await new Promise((res, rej) => {
          canvas.toBlob((b) => b ? res(b) : rej(new Error('toBlob failed')), 'image/png');
        });
        const ok = await saveBlob(blob, `maxiedit_single_${tsNow()}.png`);
        if (ok) showToast('저장 완료');
      } catch (err) {
        console.error(err);
        alert('이미지 생성에 실패했습니다.\n' + (err.message || err));
      } finally {
        loadingBarEl.setAttribute('hidden', '');
        btnSingleDownload.disabled = false;
        setDownloadingState(false);
      }
    };

    // Single MP4 — render the split layout to a canvas for 2s, record via
    // MediaRecorder, transcode to mp4 if native path isn't mp4.
    const downloadSingleMp4 = async () => {
      btnSingleDownload.disabled = true;
      loadingBarEl.removeAttribute('hidden');
      setDownloadingState(true);
      try {
        if (typeof MediaRecorder === 'undefined' || !HTMLCanvasElement.prototype.captureStream) {
          throw new Error('MediaRecorder not supported');
        }
        if (document.fonts && document.fonts.ready) await document.fonts.ready;
        const slide = await prepareSingleSlideForExport();
        const mime = pickRecorderMime();
        if (!mime) { slide.cleanup(); throw new Error('no codec'); }

        const canvas = document.createElement('canvas');
        canvas.width = SINGLE_OUT_W;
        canvas.height = SINGLE_OUT_H;
        const ctx = canvas.getContext('2d');
        drawSingleFrame(ctx, canvas.width, canvas.height, slide);
        await new Promise((r) => requestAnimationFrame(r));
        drawSingleFrame(ctx, canvas.width, canvas.height, slide);

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: VIDEO_BITRATE });
        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.start();
        const startT = performance.now();

        const rawBlob = await new Promise((resolve, reject) => {
          recorder.onerror = (e) => { slide.cleanup(); reject(new Error('recorder')); };
          recorder.onstop = () => { slide.cleanup(); resolve(new Blob(chunks, { type: mime })); };
          const draw = () => {
            const elapsed = (performance.now() - startT) / 1000;
            if (slide.type === 'video' && slide.videoEl.currentTime >= VIDEO_CLIP_SECONDS) {
              slide.videoEl.currentTime = 0;
            }
            drawSingleFrame(ctx, canvas.width, canvas.height, slide);
            if (elapsed < VIDEO_CLIP_SECONDS) requestAnimationFrame(draw);
            else { try { recorder.stop(); } catch (err) { reject(err); } }
          };
          requestAnimationFrame(draw);
        });

        let finalBlob = rawBlob;
        if (!mime.startsWith('video/mp4')) {
          showToast('MP4 변환 중…');
          finalBlob = await transcodeToMp4(rawBlob, mime);
        }
        const ok = await saveBlob(finalBlob, `maxiedit_single_${tsNow()}.mp4`);
        if (ok) showToast('저장 완료');
      } catch (err) {
        console.error(err);
        alert('영상 생성에 실패했습니다.\n' + (err.message || err));
      } finally {
        loadingBarEl.setAttribute('hidden', '');
        btnSingleDownload.disabled = false;
        setDownloadingState(false);
      }
    };

    // Single view download button → use the same chooser modal (context-aware).
    btnSingleDownload.addEventListener('click', openDownloadModal);

    // Swipe on 10_result → jump to single view (slot 0).
    const resultSection = document.querySelector('#page-result .result');
    let resTouchStartX = 0;
    let resTouchStartY = 0;
    resultSection.addEventListener('touchstart', (e) => {
      resTouchStartX = e.touches[0].clientX;
      resTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    resultSection.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - resTouchStartX;
      const dy = e.changedTouches[0].clientY - resTouchStartY;
      if (Math.abs(dy) > Math.abs(dx)) return;
      if (Math.abs(dx) < 50) return;
      if (isDownloading) return;
      if (dx < 0 && selected.length > 0) openSingle(0);
    }, { passive: true });

    btnTextTool.addEventListener('click', () => openTextedit());
    // Tapping the legend area at the bottom-left of full_image also opens
    // the all-rows text edit modal.
    const resultTextareaEl = document.getElementById('result-textarea');
    if (resultTextareaEl) {
      resultTextareaEl.addEventListener('click', () => openTextedit());
    }
    btnTexteditCancel.addEventListener('click', closeTextedit);
    btnTexteditConfirm.addEventListener('click', confirmTextedit);
    texteditOverlay.addEventListener('click', (e) => {
      if (e.target === texteditOverlay) closeTextedit();
    });

    buildResultStyleGrid(previewGridEl);
    buildResultStyleGrid(resultGridEl, (slotIdx) => {
      // Only open single view when this slot has a photo/video.
      if (selected[slotIdx] !== undefined) openSingle(slotIdx);
    });
    buildPicker();
    renderTextareas();
    render();

    // Long-press drag-reorder for selected thumbs
    if (typeof Sortable !== 'undefined') {
      Sortable.create(thumbsEl, {
        delay: 300,
        delayOnTouchOnly: false,
        animation: 160,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        filter: '.thumb-remove',
        preventOnFilter: true,
        onEnd(evt) {
          if (evt.oldIndex === evt.newIndex) return;
          const [moved] = selected.splice(evt.oldIndex, 1);
          selected.splice(evt.newIndex, 0, moved);
          render();
        }
      });
    }
  </script>
</body>
</html>
