<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MaxiEdit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" integrity="sha384-BSxuMLxX+FCbTdYec3TbXlnMGEEM2QXTFdtDaveen71o+jswm2J36+xFqp8k4VHM" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    html, body { height: 100%; background: #000; font-family: 'Inter', 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { display: flex; justify-content: center; align-items: center; overflow: hidden; }
    button { font-family: inherit; }

    :root {
      --preview-scale: 0.4;
      /* TODO #10: narrow-device safety. Frame is 393 on devices ≥393, but
         shrinks down to 100vw on 320~393 phones (iPhone SE etc). Vertical
         dimensions stay fixed; only width tracks the viewport. */
      --frame-width: min(393px, 100vw);
      /* motion tokens — see CLAUDE.md "Motion tokens" */
      --ease-snap: cubic-bezier(0.22, 0.9, 0.3, 1);
      --ease-out-soft: cubic-bezier(0.2, 0.9, 0.2, 1);
      --ease-overshoot: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-press: 0.08s;
      --dur-fast: 0.15s;
      --dur-page: 0.18s;
      --dur-base: 0.22s;
      --dur-sheet: 0.32s;
    }

    /* Honor OS-level "reduce motion" — flatten all transitions/animations
       to near-zero so the UI still updates instantly without movement. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* phone-sized frame that contains all pages and the textedit modal */
    .app-frame {
      position: relative;
      width: var(--frame-width);
      height: 852px;
      max-height: 100vh;
      max-height: 100dvh; /* modern browsers: follow the visible viewport so iOS Safari chrome doesn't cover bottom bar */
      background: #000;
      overflow: hidden;
    }

    /* pages — one visible at a time, toggled via [hidden] */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* 00_home — feature card list */
    #page-home {
      display: flex;
      flex-direction: column;
      padding: 0 20px 32px;
      background: #000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .home-stickyhead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #000;
      /* Extend background to viewport edges through page padding so cards
         scrolling underneath can't peek past the GNB on the sides. */
      margin: 0 -20px;
      padding: 0 20px;
    }
    .home-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 16px;
    }
    .home-logo {
      font-family: inherit;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #fff;
      margin: 0;
      line-height: 1;
    }
    .home-notif {
      position: relative;
      background: transparent;
      border: none;
      padding: 6px;
      margin: -6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .home-notif svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }
    .notif-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 8px;
      background: #ff3b30;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      border: 2px solid #000;
      box-sizing: border-box;
    }
    .notif-badge[hidden] { display: none; }
    .home-tabs {
      display: flex;
      gap: 6px;
      padding-bottom: 16px;
    }
    .home-tab {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.55);
    }
    .home-tab.is-active {
      background: #fff;
      color: #111;
    }
    .home-section { margin: 0 0 24px; }
    .home-section + .home-section { margin-top: 4px; }
    .home-section-title {
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 12px;
    }
    .home-card {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 168px;
      border-radius: 20px;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
    }
    /* Card thumbnail: full card width, natural aspect height-auto so the entire
       horizontal extent of the image is visible without cropping; vertical
       letterbox (if any) shows the card's solid background — the 40% scrim
       above darkens both image and letterbox uniformly. */
    .home-card-image {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      height: auto;
      display: block;
      z-index: 0;
    }
    /* Convention: every thumbnail image in a card sits under a 40% black scrim
       so foreground text and badges stay legible regardless of the photo. */
    .home-card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      pointer-events: none;
      z-index: 1;
    }
    .home-card > .home-badge,
    .home-card > .home-card-title {
      position: relative;
      z-index: 2;
    }
    .home-card + .home-card { margin-top: 12px; }
    .home-card.is-featured {
      background: #8D9B4D;
      color: #fff;
    }
    .home-card.is-featured:active { opacity: 0.9; }
    .home-card.is-disabled {
      background: #2e2e2e;
      color: rgba(255, 255, 255, 0.7);
      cursor: default;
    }
    .home-card-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }
    .home-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.4;
    }
    .home-badge.is-new {
      background: #fff5a3;
      color: #111;
    }
    .home-badge.is-soon {
      background: #d9d9d9;
      color: #333;
    }

    /* modal — backdrop + centered card. Visibility is class-driven so
       both backdrop and card can transition. The HTML `hidden` attr is
       only present on initial markup; showModal() removes it on first
       open and from then on we toggle .is-open instead. */
    .modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity var(--dur-page) ease, visibility 0s linear var(--dur-page);
    }
    .modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity var(--dur-page) ease, visibility 0s linear 0s;
    }

    /* 11_textedit modal — bottom-sheet motion (slides up from below) */
    .textedit-modal {
      width: 320px;
      max-width: 85vw;
      max-height: 80vh;
      background: #fff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      transform: translateY(100%);
      transition: transform var(--dur-sheet) var(--ease-out-soft);
    }
    .modal.is-open .textedit-modal { transform: translateY(0); }
    .textedit-list {
      flex: 1 1 auto;
      min-height: 0;
      padding: 20px 24px;
      background: #f2f2f2;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .textedit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }
    .textedit-num {
      flex-shrink: 0;
      min-width: 30px;
      font-family: inherit;     /* match the button font (Inter / Noto Sans KR) */
      font-weight: 700;
      font-size: 15px;
      color: #000;
      user-select: none;
    }
    .textedit-input {
      flex: 1 1 auto;
      min-width: 0;
      border: none;
      background: transparent;
      font-family: inherit;     /* match the button font (Inter / Noto Sans KR) */
      font-size: 15px;
      color: #000;
      padding: 4px 2px;
      outline: none;
    }
    .textedit-input:focus { background: rgba(255, 246, 0, 0.25); border-radius: 2px; }
    .textedit-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
      gap: 12px;
    }
    .btn-textedit-cancel, .btn-textedit-confirm {
      height: 40px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    .btn-textedit-cancel {
      padding: 0 18px;
      background: transparent;
      color: #888;
      font-weight: 400;
    }
    .btn-textedit-confirm {
      padding: 0 28px;
      background: #fffb8a;
      color: #111;
      font-weight: 600;
    }
    .btn-textedit-cancel:active, .btn-textedit-confirm:active { opacity: 0.7; }

    /* confirm dialog (reused for X / reset on edit page) */
    .confirm-card {
      width: 280px;
      max-width: 80vw;
      background: #fff;
      border-radius: 12px;
      padding: 24px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      transform: scale(0.96);
      transition: transform var(--dur-base) var(--ease-out-soft);
    }
    .modal.is-open .confirm-card { transform: scale(1); }
    .confirm-text {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: #111;
      text-align: center;
      margin: 0;
      white-space: pre-line;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
    }
    .confirm-actions button {
      flex: 1;
      height: 44px;
      border-radius: 4px;
      border: 1px solid transparent;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, background-color 0.15s;
    }
    .btn-confirm-cancel {
      background: transparent;
      border-color: rgba(0, 0, 0, 0.18);
      color: #111;
      font-weight: 400;
    }
    .btn-confirm-cancel:hover { background: rgba(0, 0, 0, 0.04); }
    .btn-confirm-ok {
      background: #fffb8a;
      color: #111;
      font-weight: 600;
    }
    .btn-confirm-cancel:active, .btn-confirm-ok:active { opacity: 0.78; }

    /* download format chooser modal */
    .download-card {
      width: 300px;
      max-width: 85vw;
      background: #fff;
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      transform: scale(0.96);
      transition: transform var(--dur-base) var(--ease-out-soft);
    }
    .modal.is-open .download-card { transform: scale(1); }
    .download-card h3 {
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #111;
      text-align: center;
      margin: 4px 0 12px;
    }
    .download-card button {
      padding: 14px;
      border-radius: 4px;
      border: 1px solid transparent;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, background-color 0.15s;
    }
    .download-card button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .download-card button:active { opacity: 0.78; }
    #btn-download-png { background: #fffb8a; color: #111; font-weight: 600; }
    #btn-download-mp4, #btn-download-all {
      background: transparent;
      border-color: rgba(0, 0, 0, 0.18);
      color: #111;
      font-weight: 400;
    }
    #btn-download-mp4:hover, #btn-download-all:hover {
      background: rgba(0, 0, 0, 0.04);
    }
    #btn-download-cancel {
      background: transparent;
      color: #888;
      padding: 10px;
      font-weight: 400;
      border-color: transparent;
    }

    /* 02_edit */
    .edit {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      color: #fff;
    }
    .edit-header {
      position: absolute;
      top: 12px;
      left: 0;
      right: 0;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 8px;
      z-index: 4;
    }
    /* VSCO-style icon buttons */
    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.92);
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      transition: opacity 0.15s, background-color 0.15s;
    }
    .btn-icon:hover { background: rgba(255, 255, 255, 0.06); }
    .btn-icon:active { opacity: 0.7; }
    .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-icon:disabled:hover { background: transparent; }
    .btn-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    /* Smaller left padding so the X sits closer to the screen edge than the
       symmetric internal padding would imply. */
    #btn-edit-close {
      padding: 0 12px 1px 8px;
      height: 32px;
      box-sizing: border-box;
    }

    /* preview (full_image scaled, aspect ratio preserved) */
    .preview {
      position: absolute;
      top: 69px;
      left: 0;
      right: 0;
      height: calc(522px * var(--preview-scale));
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      z-index: 1;
    }
    .preview-viewport {
      width: calc(var(--frame-width) * var(--preview-scale));
      height: calc(522px * var(--preview-scale));
      overflow: hidden;
      position: relative;
    }
    .preview .full-image {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--frame-width);   /* override .full-image width:100% so the
                                      pre-scale layout box matches the frame
                                      exactly; transform: scale then renders
                                      it to viewport dimensions */
      transform: scale(var(--preview-scale));
      transform-origin: top left;
    }

    /* bottom_layer_imageList — tabs + picker grid */
    .bottom-layer-imagelist {
      position: absolute;
      top: calc(69px + 522px * var(--preview-scale));
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 2;
      display: flex;
      flex-direction: column;
    }
    .category-tabs {
      flex: 0 0 auto;
      height: 44px;
      display: flex;
      align-items: stretch;
      gap: 0;
      padding: 0 12px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: rgba(255, 255, 255, 0.45);
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 0 12px;
      border-radius: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
    }
    .cat-tab.is-active {
      color: #fff;
      font-weight: 500;
      border-bottom-color: #fff;
    }

    .picker-grid {
      flex: 1 1 0;
      min-height: 0;
      height: 100%;
      position: relative;       /* anchor for the empty-state overlay */
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: calc((100% - 8px) / 3);
      gap: 2px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 0 2px 90px;
    }
    .photo-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background-color: #222;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .photo-item-add {
      background-color: #2c2c2c;
      border: 1px dashed #555;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 36px;
      font-weight: 200;
      line-height: 1;
      padding: 0;
      font-family: inherit;
    }
    .photo-item-add:active { background-color: #3a3a3a; }
    .media-badge-video {
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px 2px 4px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
    }
    .media-badge-video svg {
      width: 9px;
      height: 9px;
      fill: currentColor;
    }
    /* smaller variant for 56px selection thumbs */
    .thumb .media-badge-video {
      right: 3px;
      bottom: 3px;
      padding: 1px 4px 1px 3px;
      font-size: 9px;
    }
    .thumb .media-badge-video svg { width: 7px; height: 7px; }
    /* empty state — overlays picker-grid so it never participates in grid sizing
       (otherwise grid-row span + grid-auto-rows of 128px each would force a 3-row
       384px box that overflows the picker on short viewports and triggers a
       vertical scrollbar). The whole area is a single tap target. */
    .picker-empty {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 90px; /* clear the bottom-layer-select bar */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.62);
      font-family: inherit;
      cursor: pointer;
      padding: 0 20px;
      transition: background-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .picker-empty:hover { background: rgba(255, 255, 255, 0.03); color: rgba(255, 255, 255, 0.85); }
    .picker-empty:active { background: rgba(255, 255, 255, 0.06); }
    .picker-empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 200;
      line-height: 1;
      color: inherit;
      transition: border-color 0.15s;
    }
    .picker-empty:hover .picker-empty-icon { border-color: rgba(255, 255, 255, 0.5); }
    .picker-empty-text {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .icon-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      font-family: 'Inter', sans-serif;
    }
    .icon-check.off {
      background: transparent;
      border: 1.5px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      color: transparent;
    }
    .icon-check.on {
      background: #fff;
      border: 1.5px solid #fff;
      color: #000;
    }

    /* bottom_layer_select — always on top, pinned to bottom */
    .bottom-layer-select {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 78px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 8px 16px;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 3;
    }
    @keyframes bls-slide-up {
      from { transform: translateY(110%); }
      to { transform: translateY(0); }
    }
    .bottom-layer-select.is-entering {
      animation: bls-slide-up 0.55s cubic-bezier(0.22, 0.9, 0.3, 1) both;
    }
    .selected-thumbs {
      flex: 1 1 0;            /* fill all space left of the next button (with 12px gap) */
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      padding: 3px 0;
    }
    .selected-thumbs::-webkit-scrollbar { display: none; }
    .selected-thumbs:empty::before {
      content: '선택된 사진 or 영상 없음';
      color: #888;
      font-size: 12px;
      align-self: center;
      padding-left: 4px;
      flex-shrink: 0;
    }
    .thumb {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      scroll-snap-align: start;
      touch-action: none; /* so long-press drag works on touch */
    }
    .thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      pointer-events: none;
    }
    .thumb.sortable-ghost { opacity: 0.4; }
    /* sortable-chosen is added on touchstart, but Sortable's delay (300ms)
       is what gates actual drag activation. We delay the lift visual by the
       same amount via transition-delay so the yellow ring + scale appears
       AT the moment drag becomes available — communicating "you can move
       me now". Release before 300ms and the rule is gone before the delay
       elapses, so nothing flashes. Snap-back on release uses the base
       `.thumb` transition (no delay).
       Note: 0.3s here must stay in sync with Sortable.create({ delay: 300 }). */
    .thumb.sortable-chosen,
    .thumb.sortable-chosen:active {
      transform: scale(1.08);
      box-shadow: 0 0 0 2px #fffb8a, 0 6px 16px rgba(0,0,0,0.5);
      z-index: 10;
      transition: transform var(--dur-base) var(--ease-out-soft) 0.3s,
                  box-shadow var(--dur-base) var(--ease-out-soft) 0.3s;
    }
    .thumb-num {
      position: absolute;
      left: 4px;
      bottom: 2px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    .thumb-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff3b30;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 0;
    }
    .thumb-remove svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .btn-next-main {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 12px 1px;
      box-sizing: border-box;
      border-radius: 3px;
      background: #fffb8a;
      color: #111;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s;
    }
    .btn-next-main:active { opacity: 0.85; }
    .btn-next-main:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.35);
      cursor: not-allowed;
    }

    /* 10_result */
    .result {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .btn-close, .btn-download {
      position: absolute;
      top: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, background-color 0.15s;
    }
    .btn-close {
      left: 8px;
      padding: 0 12px 1px 8px;
      height: 32px;
      box-sizing: border-box;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 400;
    }
    .btn-close:hover { background: rgba(255,255,255,0.06); }
    .btn-close:active { opacity: 0.7; }
    .btn-download {
      right: 16px;
      padding: 0 12px 1px;
      height: 32px;
      box-sizing: border-box;
      background: #fffb8a;
      color: #111;
      font-weight: 600;
    }
    .btn-download:active { opacity: 0.85; }
    .btn-close svg, .btn-download svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      display: block;
    }

    /* shared full_image */
    .full-image {
      width: 100%;
      height: 522px;
      background: #fff;
      overflow: hidden;
      position: relative;
    }
    .result .full-image {
      position: absolute;
      top: 69px;
      left: 0;
    }
    .result-grid {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 31px;
    }
    .result-row {
      display: flex;
      align-items: center;
      padding: 0 15px;
      width: 100%;
    }
    .result-cell {
      flex: 1 0 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .p-section {
      position: relative;
      width: 100%;
      height: 86px;
      opacity: 0.7;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .p-section > video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-title {
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 700;
      font-size: 9px;
      color: #000;
      white-space: nowrap;
    }

    .textarea {
      position: absolute;
      top: 448px;
      left: 13px;
      display: flex;
      gap: 17px;
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 800;
      font-size: 8px;
      color: #000;
    }
    .textarea p { line-height: 11px; white-space: nowrap; }
    /* Make the result-page legend tappable as a shortcut to open text edit */
    #result-textarea { cursor: pointer; }

    .btn-reset {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.88);
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-reset:active { opacity: 0.7; }
    .btn-reset svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      display: block;
    }
    .btn-reset-label {
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
    }

    /* 12_result_single — 2-panel (image + text) view with swipeable slide track */
    .single { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; }
    .split-track {
      position: absolute;
      top: 69px;                 /* matches 10_result .full-image top */
      left: 0;
      right: 0;
      height: 522px;             /* matches 10_result .full-image height */
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; /* iOS momentum */
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      background: transparent;   /* no color — page background shows through margins */
    }
    .split-track::-webkit-scrollbar { display: none; }
    .split-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      align-items: center;       /* horizontal center */
      justify-content: center;   /* vertical center */
      background: transparent;   /* no color — page background shows through margins */
      overflow: hidden;
      min-width: 0;
      box-sizing: border-box;
    }
    .split-slide.is-flipped { flex-direction: column-reverse; }
    .split-image {
      width: 100%;               /* full slide width — matches 10_result full_image */
      flex: 0 0 50%;             /* top half of slide */
      min-height: 0;
      position: relative;
      overflow: hidden;
      background-color: #ffefb7;
    }
    /* Bleed the media 1px past every edge so sub-pixel rounding on the
       percentage-sized container can never expose the placeholder color. */
    .split-image > img,
    .split-image > video {
      position: absolute;
      top: -1px;
      left: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
      object-fit: cover;
      display: block;
    }
    .split-text {
      width: 100%;               /* matches image panel width */
      flex: 0 0 50%;             /* bottom half of slide */
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 700;
      font-size: 18px;
      color: #000;
      background: #fff;
      text-align: center;
      word-break: keep-all;
      box-sizing: border-box;
      cursor: pointer;
    }
    .indicator {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .indicator:empty { display: none; }
    /* Both 10_result .full-image and 12_single .split-track end at top 69+522=591;
       indicator sits 24px below at top 615 on both pages. */
    #result-indicator,
    #single-indicator { top: 615px; }
    .indicator-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: background-color 0.15s, width 0.18s ease;
    }
    .indicator-dot.is-active { background: #fff; width: 18px; border-radius: 3px; }
    .single-controls,
    .result-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 30px;
      display: flex;
      justify-content: flex-start;
      gap: 32px;
      padding: 0 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .single-controls::-webkit-scrollbar,
    .result-controls::-webkit-scrollbar { display: none; }
    /* Matches .btn-reset exactly so both result footers align vertically */
    .btn-text-single, .btn-flip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 4px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.88);
      cursor: pointer;
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-text-single:active, .btn-flip:active { opacity: 0.7; }
    .btn-text-single svg, .btn-flip svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* loading bar — shown during photo/video processing */
    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      z-index: 5000;
      pointer-events: none;
    }
    .loading-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #fff600, transparent);
      animation: loading-slide 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(calc(100vw / 0.35)); }
    }

    /* toast */
    .toast {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(24px);
      opacity: 0;
      background: rgba(28, 28, 28, 0.96);
      color: #fff;
      padding: 14px 20px 14px 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      z-index: 3000;
      white-space: nowrap;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1);
    }
    .toast.is-open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-check { width: 26px; height: 26px; flex-shrink: 0; }
    .toast-check-ring {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2.2;
      stroke-dasharray: 63;
      stroke-dashoffset: 63;
    }
    .toast-check-mark {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
    }
    .toast.is-open .toast-check-ring { animation: toast-ring 0.45s 0.08s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .toast.is-open .toast-check-mark { animation: toast-mark 0.35s 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes toast-ring { to { stroke-dashoffset: 0; } }
    @keyframes toast-mark { to { stroke-dashoffset: 0; } }

    /* ─── Tier 1 motion: press feedback ──────────────────────────────────
       A subtle scale-down on tap that complements each element's existing
       :active opacity rule. The base rule sets a unified transition so the
       release also eases back; selectors that previously had only opacity
       transitions now also transition transform with the same timing.
       Net change on existing animations: cat-tab 12ms→15ms (imperceptible).
       `.thumb` is intentionally excluded — its press feedback is the
       sortable-chosen lift below, which would conflict with scale(0.97). */
    .photo-item, .thumb-remove,
    .home-card,
    .btn-icon, .btn-start, .btn-next-main, .btn-download, .btn-reset,
    .btn-textedit-confirm, .btn-textedit-cancel,
    .confirm-actions button,
    .download-card button,
    .cat-tab, .home-tab {
      transition-property: opacity, background-color, color, border-color, transform;
      transition-duration: var(--dur-fast), var(--dur-fast), var(--dur-fast), var(--dur-fast), var(--dur-press);
      transition-timing-function: ease;
    }
    .photo-item:active, .thumb-remove:active,
    .home-card:not([aria-disabled="true"]):active,
    .btn-icon:active, .btn-start:active, .btn-next-main:active, .btn-download:active, .btn-reset:active,
    .btn-textedit-confirm:active, .btn-textedit-cancel:active,
    .confirm-actions button:active,
    .download-card button:active,
    .cat-tab:active, .home-tab:active {
      transform: scale(0.97);
    }
    /* Disabled cards: a softer scale + brief pulse-back so the tap feels
       acknowledged (paired with a "준비 중이에요" toast in JS). */
    .home-card[aria-disabled="true"]:active { transform: scale(0.985); }

    /* ─── Tier 1 motion: selection check pop ─────────────────────────────
       When .icon-check toggles off→on, this runs once. Same element keeps
       the .on class through reorders/renumbering, so it does not re-fire
       just because the badge number changes. */
    @keyframes check-pop {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .icon-check.on { animation: check-pop var(--dur-base) var(--ease-overshoot); }

    /* ─── Home tab carousel (Toss shopping-tab pattern) ──────────────────
       Both sections live in a horizontal track that translates between
       tabs; only the active one is visible inside the overflow:hidden
       viewport. Tab tap → JS sets data-active on the inner track →
       transform animates from 0 to -50%. The unconditional sections
       (those without data-tab) sit OUTSIDE this track and remain visible
       on every tab. Track height tracks the active section because the
       inactive section is offscreen but still occupies the layout — for
       MaxiEdit's two-tab home this is fine since both are short. */
    .home-tab-track {
      position: relative;
      overflow: hidden;
      /* No width / margin / padding tricks — let the track stretch naturally
         to #page-home's content-box (page width minus 20px page padding each
         side). The original margin: 0 -20 + padding: 0 20 trick was meant to
         extend a background through the page padding, but the track has no
         visible decoration; combined with `width: 200%` on the inner it
         was making sections narrower than the visible viewport, which let
         the next tab leak in past `overflow: hidden`. */
    }
    .home-tab-track-inner {
      display: flex;
      align-items: flex-start;
      /* 16px gutter between tabs while swiping (matches Toss). The inner
         is V (viewport) per section + 16px gap × 1, so total = 2V + 16. */
      gap: 16px;
      width: calc(200% + 16px);
      transform: translateX(0);
      transition: transform var(--dur-sheet) var(--ease-snap);
      will-change: transform;
      /* Let the browser keep handling vertical scroll; we intercept
         horizontal pan ourselves via touchstart/move/end below. */
      touch-action: pan-y;
    }
    .home-tab-track-inner > .home-section {
      /* 50% of inner is V+8; subtract half the gap to land on V exactly. */
      flex: 0 0 calc(50% - 8px);
      min-width: 0;
      margin: 0; /* override the default 0 0 24px so the carousel rows align */
    }
    /* Snap target for upcoming = -(V + 16). In inner terms that is
       -(50% + 8px) since 50% of inner = V+8. */
    .home-tab-track-inner[data-active="upcoming"] { transform: translateX(calc(-50% - 8px)); }
    /* Spacing between the carousel and the always-visible "ig 피드 만들기"
       section that sits below it. Matches the original feel from before
       the carousel landed (24px between blocks). */
    .home-tab-track + .home-section { margin-top: 24px; }
    /* 준비중 탭 placeholder — soft centered message, no card. */
    .home-section--empty { padding: 80px 20px; text-align: center; }
    .home-empty {
      font-family: inherit;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      margin: 0;
    }

    /* ─── Disabled-card pulse ────────────────────────────────────────────
       One-shot wiggle to acknowledge a tap on a 준비중 card without
       suggesting the action succeeded. The toast carries the verbal cue. */
    @keyframes card-pulse {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.985); }
      100% { transform: scale(1); }
    }
    .home-card--pulse { animation: card-pulse 0.32s var(--ease-out-soft); }
  </style>
</head>
<body>
  <div class="app-frame">
  <section class="page" id="page-home" data-name="00_home">
    <div class="home-stickyhead">
      <div class="home-topbar">
        <h1 class="home-logo">MAXI</h1>
        <button class="home-notif" type="button" data-name="btn_notification" aria-label="알림">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/>
          </svg>
          <span class="notif-badge" id="notif-badge" aria-hidden="true" hidden></span>
        </button>
      </div>
      <div class="home-tabs" role="tablist">
        <button class="home-tab is-active" type="button" role="tab" aria-selected="true" data-tab="home">홈</button>
        <button class="home-tab" type="button" role="tab" aria-selected="false" data-tab="upcoming">준비중</button>
      </div>
    </div>
    <div class="home-tab-track">
      <div class="home-tab-track-inner" id="home-tab-track" data-active="home">
        <section class="home-section" data-tab="home">
          <h2 class="home-section-title">새로 나왔어요</h2>
          <button class="home-card is-featured" type="button" id="btn-start" data-name="btn_start">
            <img class="home-card-image" src="images/thum_feed_image01.png" alt="" aria-hidden="true">
            <span class="home-card-overlay" aria-hidden="true"></span>
            <span class="home-badge is-new">New</span>
            <span class="home-card-title">매거진느낌 피드</span>
          </button>
        </section>
        <section class="home-section home-section--empty" data-tab="upcoming">
          <p class="home-empty">준비 중인 콘텐츠가 없어요</p>
        </section>
      </div>
    </div>
    <!-- "ig 피드 만들기" sits OUTSIDE the carousel so it stays visible on
         every tab. The cards inside are aria-disabled (not [disabled]) so
         press feedback + the "준비 중이에요" toast still fire on tap. -->
    <section class="home-section">
      <h2 class="home-section-title">ig 피드 만들기</h2>
      <button class="home-card is-disabled" type="button" aria-disabled="true" data-name="card_feed_crop">
        <span class="home-badge is-soon">업데이트 예정</span>
        <span class="home-card-title">피드자르기</span>
      </button>
      <button class="home-card is-disabled" type="button" aria-disabled="true" data-name="card_slide_feed">
        <span class="home-badge is-soon">업데이트 예정</span>
        <span class="home-card-title">슬라이드 피드</span>
      </button>
    </section>
  </section>

  <!-- 02_edit page -->
  <section class="page" id="page-edit" hidden>
    <input type="file" id="photo-input" accept="image/*,video/*" multiple style="display:none">
    <section class="edit" data-name="02_edit">
      <div class="edit-header">
        <button class="btn-icon" type="button" id="btn-edit-close" data-name="btn_close" aria-label="닫기">

  <script>
    // Global error handlers — TODO #4 stage 1.
    // Currently just console.error so issues surface during development.
    // When Sentry (or any other reporter) is wired in (stage 2), hook it
    // here so all error/rejection events flow through one funnel.
    window.addEventListener('error', (event) => {
      console.error('[uncaught error]', event.message, {
        filename: event.filename,
        line: event.lineno,
        col: event.colno,
        error: event.error,
      });
    });
    window.addEventListener('unhandledrejection', (event) => {
      console.error('[unhandled rejection]', event.reason);
    });

    const MAX_SELECT = 9;
    const SLOT_COLORS = [
      '#ffefb7', '#ffdfdf', '#d9d9d9',
      '#d2ecff', '#dcefe7', '#e7e7e7',
      '#d1f2c2', '#ebdff7', '#d9d9d9'
    ];

    // PROTOTYPE — soft pastel "photos" generated at runtime so the 최근항목
    // tab feels populated on edit-page entry. Replace with real device-photo
    // loading (Capacitor/Cordova photo-library plugin → Info.plist permission
    // → photos[].push) when wiring native PhotoKit access.
    const PROTO_PALETTE = [
      ['#ffd4cc', '#ff9a8b'], ['#cfe9ff', '#7da3ff'], ['#e3d4ff', '#b990ff'],
      ['#d6f1d0', '#7fc97f'], ['#fff1c4', '#f5c945'], ['#ffd0e0', '#ff7da6'],
      ['#cdeae6', '#5ba8a0'], ['#ffe2c4', '#ff9a4f'], ['#dfd9ff', '#8b7ff5'],
      ['#fff3d4', '#dab66c'], ['#cfe0ff', '#5e7fcd'], ['#e7d8c5', '#8c6f4d'],
    ];
    const generatePrototypePhotoUrl = (top, bottom, num) => {
      const c = document.createElement('canvas');
      c.width = 400; c.height = 600;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 400, 600);
      g.addColorStop(0, top);
      g.addColorStop(1, bottom);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 400, 600);
      // Subtle number stamp so the user can tell samples apart.
      ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
      ctx.font = '300 88px "Inter", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(num).padStart(2, '0'), 200, 300);
      return c.toDataURL('image/jpeg', 0.85);
    };
    const loadPrototypeRecentPhotos = () => {
      if (photos.length > 0) return;
      PROTO_PALETTE.forEach(([top, bottom], i) => {
        const url = generatePrototypePhotoUrl(top, bottom, i + 1);
        photos.push({ url, originalUrl: url, name: `sample-${i + 1}.jpg`, type: 'image' });
      });
    };
    // Media loaded from the device (via <input type="file" accept="image/*,video/*">).
    // Each entry: {
    //   url,         // object URL used as visible thumbnail (first frame for videos)
    //   originalUrl, // underlying file URL (same as url for images)
    //   name,        // original file name
    //   type,        // 'image' | 'video'
    //   duration,    // video only, in seconds (may be null if unknown)
    // }
    const photos = [];

    // Clip every selected video at the very start — length used as the final slot.
    const VIDEO_CLIP_SECONDS = 2;
    // Hard limits applied before we even try to thumbnail a video.
    const MAX_VIDEO_SIZE_BYTES = 1 * 1024 * 1024 * 1024; // 1 GB
    const MAX_VIDEO_DURATION_S = 25 * 60; // 25 min

    // Format seconds as M:SS for the picker duration badge.
    const formatDuration = (seconds) => {
      if (!isFinite(seconds) || seconds <= 0) return '';
      const s = Math.round(seconds);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, '0')}`;
    };

    // Pill badge with play glyph + label (e.g. "0:15" or "1s").
    const makeVideoBadgeHTML = (label) =>
      '<span class="media-badge-video" aria-label="동영상">' +
      '<svg viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>' +
      (label ? `<span>${label}</span>` : '') +
      '</span>';

    // Placeholder tile used when video thumbnail generation fails — the video is
    // still attached, just without a frame preview so the user can see it's there.
    const VIDEO_FALLBACK_THUMB =
      'data:image/svg+xml;utf8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
        '<rect width="100" height="100" fill="#3a3a3a"/>' +
        '<polygon points="40,32 72,50 40,68" fill="#fff"/>' +
        '</svg>'
      );

    // Draw the video's opening frame onto a canvas to use as thumbnail; also return duration.
    const generateVideoThumbnail = async (file) => {
      const video = document.createElement('video');
      const sourceUrl = URL.createObjectURL(file);
      video.src = sourceUrl;
      video.muted = true;
      video.defaultMuted = true;
      video.playsInline = true;
      video.setAttribute('muted', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.preload = 'auto';
      // Keep in DOM — some mobile browsers refuse to decode frames for offscreen video.
      video.style.cssText = 'position:fixed;top:0;left:0;width:64px;height:64px;opacity:0.001;pointer-events:none;z-index:-9999;';
      document.body.appendChild(video);

      const cleanup = () => {
        try { video.pause(); } catch {}
        if (video.parentNode) video.parentNode.removeChild(video);
        try { video.removeAttribute('src'); video.load(); } catch {}
      };

      const waitFor = (eventName, ms) => new Promise((resolve, reject) => {
        const onOk = () => { cleanupWait(); resolve(); };
        const onErr = () => { cleanupWait(); reject(new Error(`${eventName} failed (code ${video.error ? video.error.code : '?'})`)); };
        const timer = setTimeout(() => { cleanupWait(); reject(new Error(`${eventName} timeout`)); }, ms);
        const cleanupWait = () => {
          clearTimeout(timer);
          video.removeEventListener(eventName, onOk);
          video.removeEventListener('error', onErr);
        };
        video.addEventListener(eventName, onOk, { once: true });
        video.addEventListener('error', onErr, { once: true });
      });

      try {
        await waitFor('loadedmetadata', 6000);
        // Muted autoplay is allowed on iOS 10+. A brief play/pause pushes the decoder
        // to actually render frames before we try to paint one to canvas.
        try { await video.play(); video.pause(); } catch {}
        // Seek to a small non-zero offset — setting currentTime to 0 when already at 0
        // does not fire 'seeked' and we would hang forever.
        const seekTarget = Math.min(0.05, (video.duration || 1) / 10);
        const seekedPromise = waitFor('seeked', 5000);
        video.currentTime = seekTarget;
        await seekedPromise;

        const duration = isFinite(video.duration) ? video.duration : null;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 320;
        canvas.height = video.videoHeight || 320;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise((res, rej) => {
          canvas.toBlob((b) => b ? res(b) : rej(new Error('toBlob null')), 'image/jpeg', 0.85);
        });
        cleanup();
        return { thumbUrl: URL.createObjectURL(blob), originalUrl: sourceUrl, duration };
      } catch (err) {
        cleanup();
        URL.revokeObjectURL(sourceUrl);
        throw err;
      }
    };

    const TEXT_LABELS_DEFAULT = [
      'Personal color',
      'We can be anything',
      'Moment',
      '“What do you think?”',
      'Look good',
      'Start to smile',
      'Preparation',
      'Nice playlist',
      'We’re ready'
