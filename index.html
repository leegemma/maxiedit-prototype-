<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MaxiEdit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    html, body { height: 100%; background: #000; font-family: 'Inter', 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { display: flex; justify-content: center; align-items: center; overflow: hidden; }
    button { font-family: inherit; }

    :root { --preview-scale: 0.4; }

    /* phone-sized frame that contains all pages and the textedit modal */
    .app-frame {
      position: relative;
      width: 393px;
      height: 852px;
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100dvh; /* modern browsers: follow the visible viewport so iOS Safari chrome doesn't cover bottom bar */
      background: #000;
      overflow: hidden;
    }

    /* pages — one visible at a time, toggled via [hidden] */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* 00_home */
    .home-title {
      position: absolute;
      top: 29px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 34px;
      color: #fff;
      white-space: nowrap;
    }
    .btn-camera, .btn-start {
      position: absolute;
      left: 16px;
      width: 361px;
      height: 323px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 14px;
      color: #000;
      border: none;
      cursor: pointer;
    }
    .btn-camera { top: 98px; background: #aaa; }
    .btn-start  { top: 447px; background: #fffb8a; }

    /* modal — only used by the textedit popup; sits above the current page */
    .modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.is-open { display: flex !important; }

    /* 11_textedit modal */
    .textedit-modal {
      width: 320px;
      max-width: 85vw;
      max-height: 80vh;
      background: #fff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }
    .textedit-list {
      flex: 1 1 auto;
      min-height: 0;
      padding: 20px 24px;
      background: #f2f2f2;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .textedit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }
    .textedit-num {
      flex-shrink: 0;
      min-width: 30px;
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 700;
      font-size: 15px;
      color: #000;
      user-select: none;
    }
    .textedit-input {
      flex: 1 1 auto;
      min-width: 0;
      border: none;
      background: transparent;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 15px;
      color: #000;
      padding: 4px 2px;
      outline: none;
    }
    .textedit-input:focus { background: rgba(255, 246, 0, 0.25); border-radius: 2px; }
    .textedit-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
      gap: 12px;
    }
    .btn-textedit-cancel, .btn-textedit-confirm {
      height: 38px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      border-radius: 4px;
    }
    .btn-textedit-cancel { padding: 0 16px; background: transparent; color: #555; }
    .btn-textedit-confirm { padding: 0 32px; background: #fff600; color: #000; }

    /* download format chooser modal */
    .download-card {
      width: 300px;
      max-width: 85vw;
      background: #fff;
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }
    .download-card h3 {
      font-size: 15px;
      font-weight: 700;
      color: #000;
      text-align: center;
      margin: 4px 0 8px;
    }
    .download-card button {
      padding: 12px;
      border-radius: 4px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .download-card button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    #btn-download-png { background: #fff600; color: #000; }
    #btn-download-mp4 { background: #222; color: #fff; }
    #btn-download-cancel { background: transparent; color: #666; padding: 8px; font-weight: 500; }

    /* 02_edit */
    .edit {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      color: #fff;
    }
    .edit-header {
      position: absolute;
      top: 37px;
      left: 0;
      right: 0;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 4;
    }
    /* shadcn/ui-style icon buttons (Lucide icons) */
    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: transparent;
      border: none;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.15s, opacity 0.15s;
    }
    .btn-icon:hover { background: rgba(255, 255, 255, 0.08); }
    .btn-icon:active { background: rgba(255, 255, 255, 0.16); }
    .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-icon:disabled:hover { background: transparent; }
    .btn-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* preview (full_image scaled, aspect ratio preserved) */
    .preview {
      position: absolute;
      top: 94px;
      left: 0;
      right: 0;
      height: calc(522px * var(--preview-scale));
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      z-index: 1;
    }
    .preview-viewport {
      width: calc(393px * var(--preview-scale));
      height: calc(522px * var(--preview-scale));
      overflow: hidden;
      position: relative;
    }
    .preview .full-image {
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(var(--preview-scale));
      transform-origin: top left;
    }

    /* bottom_layer_imageList — tabs + picker grid */
    .bottom-layer-imagelist {
      position: absolute;
      top: calc(94px + 522px * var(--preview-scale));
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 2;
      display: flex;
      flex-direction: column;
    }
    .category-tabs {
      flex: 0 0 auto;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      background: transparent;
      border: none;
      color: #bbb;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cat-tab.is-active { background: #fff; color: #000; font-weight: 700; }

    .picker-grid {
      flex: 1 1 0;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: calc((393px - 8px) / 3);
      gap: 2px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 0 2px 90px;
    }
    .photo-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background-color: #222;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .photo-item-add {
      background-color: #2c2c2c;
      border: 1px dashed #555;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 36px;
      font-weight: 200;
      line-height: 1;
      padding: 0;
      font-family: inherit;
    }
    .photo-item-add:active { background-color: #3a3a3a; }
    .media-badge-video {
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px 2px 4px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
    }
    .media-badge-video svg {
      width: 9px;
      height: 9px;
      fill: currentColor;
    }
    /* smaller variant for 56px selection thumbs */
    .thumb .media-badge-video {
      right: 3px;
      bottom: 3px;
      padding: 1px 4px 1px 3px;
      font-size: 9px;
    }
    .thumb .media-badge-video svg { width: 7px; height: 7px; }
    /* empty state — shown inside picker-grid when no photos loaded */
    .picker-empty {
      grid-column: 1 / -1;
      grid-row: 1 / 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 20px;
      color: #bbb;
      font-size: 14px;
      text-align: center;
    }
    .picker-empty button {
      padding: 10px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .icon-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      font-family: 'Inter', sans-serif;
    }
    .icon-check.off {
      background: transparent;
      border: 1.5px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      color: transparent;
    }
    .icon-check.on {
      background: #fff;
      border: 1.5px solid #fff;
      color: #000;
    }

    /* bottom_layer_select — always on top, pinned to bottom */
    .bottom-layer-select {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 82px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: rgba(40, 40, 40, 0.92);
      backdrop-filter: blur(6px);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      z-index: 3;
    }
    .selected-thumbs {
      flex: 0 0 248px;
      width: 248px;
      max-width: 248px;
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      padding: 3px 0;
    }
    .selected-thumbs::-webkit-scrollbar { display: none; }
    .selected-thumbs:empty::before {
      content: '선택된 사진 없음';
      color: #888;
      font-size: 12px;
      align-self: center;
      padding-left: 4px;
      flex-shrink: 0;
    }
    .thumb {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      scroll-snap-align: start;
      touch-action: none; /* so long-press drag works on touch */
    }
    .thumb.sortable-ghost { opacity: 0.4; }
    .thumb.sortable-chosen { transform: scale(1.08); box-shadow: 0 6px 16px rgba(0,0,0,0.5); z-index: 10; }
    .thumb-num {
      position: absolute;
      left: 4px;
      bottom: 2px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    .thumb-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: #ff3b30;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      padding: 0;
    }
    .thumb-remove::before { content: '−'; }

    .btn-next-main {
      flex-shrink: 0;
      height: 40px;
      padding: 0 16px;
      border-radius: 4px;
      background: #fff;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-next-main:disabled { background: #555; color: #999; cursor: not-allowed; }

    /* 10_result */
    .result {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .btn-close, .btn-download {
      position: absolute;
      top: 37px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    .btn-close {
      left: 8px;
      padding: 8px;
      background: transparent;
      color: #ffffff;
    }
    .btn-close:hover { background: rgba(255,255,255,0.08); }
    .btn-close:active { background: rgba(255,255,255,0.16); }
    .btn-download {
      right: 15px;
      padding: 8px 14px;
      background: #fff600;
      color: #000;
    }
    .btn-close svg, .btn-download svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      display: block;
    }

    /* shared full_image */
    .full-image {
      width: 393px;
      height: 522px;
      background: #fff;
      overflow: hidden;
      position: relative;
    }
    .result .full-image {
      position: absolute;
      top: 94px;
      left: 0;
    }
    .result-grid {
      position: absolute;
      top: 15px;
      left: 0;
      width: 393px;
      display: flex;
      flex-direction: column;
      gap: 31px;
    }
    .result-row {
      display: flex;
      align-items: center;
      padding: 0 15px;
      width: 100%;
    }
    .result-cell {
      flex: 1 0 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .p-section {
      position: relative;
      width: 100%;
      height: 86px;
      opacity: 0.7;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .p-section > video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-title {
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 700;
      font-size: 9px;
      color: #000;
      white-space: nowrap;
    }

    .textarea {
      position: absolute;
      top: 448px;
      left: 13px;
      display: flex;
      gap: 17px;
      font-family: 'Nanum Myeongjo', serif;
      font-weight: 800;
      font-size: 8px;
      color: #000;
    }
    .textarea p { line-height: 11px; white-space: nowrap; }

    .btn-reset {
      position: absolute;
      top: 670px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #fff;
    }
    .btn-reset svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      display: block;
    }
    .btn-reset-label { font-size: 14px; color: #fff; }

    /* loading bar — shown during photo/video processing */
    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      z-index: 5000;
      pointer-events: none;
    }
    .loading-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #fff600, transparent);
      animation: loading-slide 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(calc(100vw / 0.35)); }
    }

    /* toast */
    .toast {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(24px);
      opacity: 0;
      background: rgba(28, 28, 28, 0.96);
      color: #fff;
      padding: 14px 20px 14px 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      z-index: 3000;
      white-space: nowrap;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1);
    }
    .toast.is-open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-check { width: 26px; height: 26px; flex-shrink: 0; }
    .toast-check-ring {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2.2;
      stroke-dasharray: 63;
      stroke-dashoffset: 63;
    }
    .toast-check-mark {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
    }
    .toast.is-open .toast-check-ring { animation: toast-ring 0.45s 0.08s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .toast.is-open .toast-check-mark { animation: toast-mark 0.35s 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes toast-ring { to { stroke-dashoffset: 0; } }
    @keyframes toast-mark { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body>
  <div class="app-frame">
  <section class="page" id="page-home" data-name="00_home">
    <h1 class="home-title">MaxiEdit</h1>
    <button class="btn-camera" type="button" data-name="btn_camera">사진찍기</button>
    <button class="btn-start" type="button" id="btn-start" data-name="btn_start">편집하기</button>
  </section>

  <!-- 02_edit page -->
  <section class="page" id="page-edit" hidden>
    <input type="file" id="photo-input" accept="image/*,video/*" multiple style="display:none">
    <section class="edit" data-name="02_edit">
      <div class="edit-header">
        <button class="btn-icon" type="button" id="btn-edit-close" data-name="btn_close" aria-label="닫기">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button class="btn-icon" type="button" id="btn-reset-top" data-name="btn_reset" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          <span>초기화</span>
        </button>
      </div>

      <div class="preview" data-name="preview">
        <div class="preview-viewport">
          <div class="full-image" id="preview-full-image">
            <div class="result-grid" id="preview-grid"></div>
            <div class="textarea" id="preview-textarea"></div>
          </div>
        </div>
      </div>

      <div class="bottom-layer-imagelist" data-name="bottom_layer_imageList">
        <div class="category-tabs">
          <button class="cat-tab is-active" type="button">최근항목</button>
          <button class="cat-tab" type="button">즐겨찾기</button>
          <button class="cat-tab" type="button">Video</button>
          <button class="cat-tab" type="button">셀피</button>
          <button class="cat-tab" type="button">Live Photo</button>
          <button class="cat-tab" type="button">파노라마</button>
          <button class="cat-tab" type="button">고속 연사 촬영</button>
          <button class="cat-tab" type="button">스크린샷</button>

  <!-- download format chooser modal -->

  <!-- 11_textedit modal (only accessible from 10_result) -->
  <div class="modal" id="textedit-overlay" role="dialog" aria-modal="true" aria-label="텍스트 수정" hidden>
    <div class="textedit-modal" data-name="11_textedit">
      <div class="textedit-list" id="textedit-list"></div>
      <div class="textedit-actions">
        <button class="btn-textedit-cancel" type="button" id="btn-textedit-cancel">취소</button>

  <div class="loading-bar" id="loading-bar" hidden></div>
  <div class="toast" id="toast" role="status" aria-live="polite" hidden>
    <svg class="toast-check" viewBox="0 0 24 24" aria-hidden="true">
      <circle class="toast-check-ring" cx="12" cy="12" r="10"/>
      <path class="toast-check-mark" d="M7 12.5l3.2 3.2L17 9"/>
    </svg>
    <span id="toast-text">저장 완료</span>
  </div>
  </div><!-- /.app-frame -->

  <script>
    const MAX_SELECT = 9;
    const SLOT_COLORS = [
      '#ffefb7', '#ffdfdf', '#d9d9d9',
      '#d2ecff', '#dcefe7', '#e7e7e7',
      '#d1f2c2', '#ebdff7', '#d9d9d9'
    ];
    // Media loaded from the device (via <input type="file" accept="image/*,video/*">).
    // Each entry: {
    //   url,         // object URL used as visible thumbnail (first frame for videos)
    //   originalUrl, // underlying file URL (same as url for images)
    //   name,        // original file name
    //   type,        // 'image' | 'video'
    //   duration,    // video only, in seconds (may be null if unknown)
    // }
    const photos = [];

    // Clip every selected video at the very start — length used as the final slot.
    const VIDEO_CLIP_SECONDS = 2;

    // Format seconds as M:SS for the picker duration badge.
    const formatDuration = (seconds) => {
      if (!isFinite(seconds) || seconds <= 0) return '';
      const s = Math.round(seconds);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, '0')}`;
    };

    // Pill badge with play glyph + label (e.g. "0:15" or "1s").
    const makeVideoBadgeHTML = (label) =>
      '<span class="media-badge-video" aria-label="동영상">' +
      '<svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="6 4 20 12 6 20 6 4"/></svg>' +
      (label ? `<span>${label}</span>` : '') +
      '</span>';

    // Placeholder tile used when video thumbnail generation fails — the video is
    // still attached, just without a frame preview so the user can see it's there.
    const VIDEO_FALLBACK_THUMB =
      'data:image/svg+xml;utf8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
        '<rect width="100" height="100" fill="#3a3a3a"/>' +
        '<polygon points="40,32 72,50 40,68" fill="#fff"/>' +
        '</svg>'
      );

    // Draw the video's opening frame onto a canvas to use as thumbnail; also return duration.
    const generateVideoThumbnail = async (file) => {
      const video = document.createElement('video');
      const sourceUrl = URL.createObjectURL(file);
      video.src = sourceUrl;
      video.muted = true;
      video.defaultMuted = true;
      video.playsInline = true;
      video.setAttribute('muted', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.preload = 'auto';
      // Keep in DOM — some mobile browsers refuse to decode frames for offscreen video.
      video.style.cssText = 'position:fixed;top:0;left:0;width:64px;height:64px;opacity:0.001;pointer-events:none;z-index:-9999;';
      document.body.appendChild(video);

      const cleanup = () => {
        try { video.pause(); } catch {}
        if (video.parentNode) video.parentNode.removeChild(video);
        try { video.removeAttribute('src'); video.load(); } catch {}
      };

      const waitFor = (eventName, ms) => new Promise((resolve, reject) => {
        const onOk = () => { cleanupWait(); resolve(); };
        const onErr = () => { cleanupWait(); reject(new Error(`${eventName} failed (code ${video.error ? video.error.code : '?'})`)); };
        const timer = setTimeout(() => { cleanupWait(); reject(new Error(`${eventName} timeout`)); }, ms);
        const cleanupWait = () => {
          clearTimeout(timer);
          video.removeEventListener(eventName, onOk);
          video.removeEventListener('error', onErr);
        };
        video.addEventListener(eventName, onOk, { once: true });
        video.addEventListener('error', onErr, { once: true });
      });

      try {
        await waitFor('loadedmetadata', 6000);
        // Muted autoplay is allowed on iOS 10+. A brief play/pause pushes the decoder
        // to actually render frames before we try to paint one to canvas.
        try { await video.play(); video.pause(); } catch {}
        // Seek to a small non-zero offset — setting currentTime to 0 when already at 0
        // does not fire 'seeked' and we would hang forever.
        const seekTarget = Math.min(0.05, (video.duration || 1) / 10);
        const seekedPromise = waitFor('seeked', 5000);
        video.currentTime = seekTarget;
        await seekedPromise;

        const duration = isFinite(video.duration) ? video.duration : null;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 320;
        canvas.height = video.videoHeight || 320;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise((res, rej) => {
          canvas.toBlob((b) => b ? res(b) : rej(new Error('toBlob null')), 'image/jpeg', 0.85);
        });
        cleanup();
        return { thumbUrl: URL.createObjectURL(blob), originalUrl: sourceUrl, duration };
      } catch (err) {
        cleanup();
        URL.revokeObjectURL(sourceUrl);
        throw err;
      }
    };

    const TEXT_LABELS_DEFAULT = [
      'Personal color',
      'We can be anything',
      'Moment',
      '“What do you think?”',
      'Look good',
      'Start to smile',
      'Preparation',
      'Nice playlist',
      'We’re ready'
    ];
    const textLabels = [...TEXT_LABELS_DEFAULT];

    const pageHome = document.getElementById('page-home');
    const pageEdit = document.getElementById('page-edit');
    const pageResult = document.getElementById('page-result');
    const texteditOverlay = document.getElementById('textedit-overlay');
    const btnStart = document.getElementById('btn-start');
    const btnEditClose = document.getElementById('btn-edit-close');
    const btnResetTop = document.getElementById('btn-reset-top');
    const btnNext = document.getElementById('btn-next');
    const btnClose = document.getElementById('btn-close');
    const btnDownload = document.getElementById('btn-download');
    const toastEl = document.getElementById('toast');
    const toastTextEl = document.getElementById('toast-text');
    const loadingBarEl = document.getElementById('loading-bar');
    const btnTextTool = document.getElementById('btn-text-tool');
    const btnTexteditCancel = document.getElementById('btn-textedit-cancel');
    const btnTexteditConfirm = document.getElementById('btn-textedit-confirm');
    const pickerGrid = document.getElementById('picker-grid');
    const photoInput = document.getElementById('photo-input');
    const previewGridEl = document.getElementById('preview-grid');
    const resultGridEl = document.getElementById('result-grid');
    const thumbsEl = document.getElementById('selected-thumbs');
    const texteditList = document.getElementById('textedit-list');
    const textareaEls = [
      document.getElementById('preview-textarea'),
      document.getElementById('result-textarea')
    ];

    const selected = [];

    const buildResultStyleGrid = (target) => {
      target.innerHTML = '';
      for (let r = 0; r < 3; r++) {
        const row = document.createElement('div');
        row.className = 'result-row';
        for (let c = 0; c < 3; c++) {
          const slotIndex = r * 3 + c;
          const cell = document.createElement('div');
          cell.className = 'result-cell';
          const section = document.createElement('div');
          section.className = 'p-section';
          section.dataset.slot = String(slotIndex);
          section.style.background = SLOT_COLORS[slotIndex];
          const title = document.createElement('p');
          title.className = 'photo-title';
          title.textContent = `(${slotIndex + 1})`;
          cell.appendChild(section);
          cell.appendChild(title);
          row.appendChild(cell);
        }
        target.appendChild(row);
      }
    };

    const buildPicker = () => {
      pickerGrid.innerHTML = '';
      if (photos.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'picker-empty';
        const msg = document.createElement('p');
        msg.textContent = '사진을 선택해 주세요';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = '사진 선택';
        btn.addEventListener('click', () => photoInput.click());
        empty.appendChild(msg);
        empty.appendChild(btn);
        pickerGrid.appendChild(empty);
        return;
      }
      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.style.backgroundImage = `url("${photo.url}")`;
        item.dataset.index = String(i);
        if (photo.type === 'video') {
          const label = formatDuration(photo.duration);
          item.insertAdjacentHTML('beforeend', makeVideoBadgeHTML(label));
        }
        const icon = document.createElement('span');
        icon.className = 'icon-check off';
        icon.dataset.name = 'icon_check_off';
        item.appendChild(icon);
        item.addEventListener('click', () => togglePhoto(i));
        pickerGrid.appendChild(item);
      });
      // "+" tile at the end to append more photos/videos.
      const addBtn = document.createElement('button');
      addBtn.className = 'photo-item photo-item-add';
      addBtn.type = 'button';
      addBtn.textContent = '+';
      addBtn.setAttribute('aria-label', '사진/동영상 추가');
      addBtn.addEventListener('click', () => {
        photoInput.dataset.mode = 'append';
        photoInput.click();
      });
      pickerGrid.appendChild(addBtn);
    };

    const applyPhotoBg = (el, photoIdx) => {
      const photo = photos[photoIdx];
      if (!photo) return;
      el.style.backgroundImage = `url("${photo.url}")`;
      el.style.backgroundSize = 'cover';
      el.style.backgroundPosition = 'center';
      el.style.backgroundRepeat = 'no-repeat';
      el.style.backgroundColor = '';
    };
    const clearPhotoBg = (el, fallbackColor) => {
      el.style.backgroundImage = '';
      el.style.backgroundColor = fallbackColor || '';
    };

    const togglePhoto = (index) => {
      const pos = selected.indexOf(index);
      if (pos >= 0) {
        selected.splice(pos, 1);
      } else {
        if (selected.length >= MAX_SELECT) return;
        selected.push(index);
      }
      render();
    };

    const renderGridSlots = (gridEl, { animateVideos = false } = {}) => {
      gridEl.querySelectorAll('.p-section').forEach((section) => {
        const slotIndex = Number(section.dataset.slot);
        const photoIdx = selected[slotIndex];
        const photo = photoIdx !== undefined ? photos[photoIdx] : null;

        // Always remove any prior video element — we rebuild based on current state.
        const priorVideo = section.querySelector('video');
        if (priorVideo) { try { priorVideo.pause(); } catch {} priorVideo.remove(); }

        if (!photo) {
          clearPhotoBg(section, SLOT_COLORS[slotIndex]);
          section.style.opacity = '0.7';
          return;
        }

        if (photo.type === 'video' && animateVideos && photo.originalUrl) {
          // Clean background; a <video> child plays the 2s loop on top.
          clearPhotoBg(section, '#000');
          const v = document.createElement('video');
          v.src = photo.originalUrl;
          v.muted = true;
          v.defaultMuted = true;
          v.playsInline = true;
          v.setAttribute('muted', '');
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.autoplay = true;
          v.loop = true;
          v.addEventListener('timeupdate', () => {
            if (v.currentTime >= VIDEO_CLIP_SECONDS) v.currentTime = 0;
          });
          section.appendChild(v);
          v.play().catch(() => { /* autoplay rejected is fine; shows first frame */ });
        } else {
          applyPhotoBg(section, photoIdx);
        }
        section.style.opacity = '1';
      });
    };

    const render = () => {
      // picker check icons — skip the trailing "+" tile which has no .icon-check
      pickerGrid.querySelectorAll('.photo-item:not(.photo-item-add)').forEach((item) => {
        const idx = Number(item.dataset.index);
        const selPos = selected.indexOf(idx);
        const icon = item.querySelector('.icon-check');
        if (selPos >= 0) {
          icon.classList.remove('off');
          icon.classList.add('on');
          icon.dataset.name = 'icon_check_on';
          icon.dataset.selectNumber = String(selPos + 1);
          icon.textContent = String(selPos + 1);
        } else {
          icon.classList.remove('on');
          icon.classList.add('off');
          icon.dataset.name = 'icon_check_off';
          delete icon.dataset.selectNumber;
          icon.textContent = '';
        }
      });

      renderGridSlots(previewGridEl);
      renderGridSlots(resultGridEl, { animateVideos: true });

      // bottom thumbs
      thumbsEl.innerHTML = '';
      selected.forEach((photoIdx, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        applyPhotoBg(thumb, photoIdx);
        thumb.dataset.photoIdx = String(photoIdx);
        if (photos[photoIdx] && photos[photoIdx].type === 'video') {
          thumb.insertAdjacentHTML('beforeend', makeVideoBadgeHTML(`${VIDEO_CLIP_SECONDS}s`));
        }
        const num = document.createElement('span');
        num.className = 'thumb-num';
        num.textContent = String(i + 1);
        const remove = document.createElement('button');
        remove.className = 'thumb-remove';
        remove.type = 'button';
        remove.setAttribute('aria-label', '선택 해제');
        remove.addEventListener('click', (e) => {
          e.stopPropagation();
          togglePhoto(photoIdx);
        });
        thumb.appendChild(num);
        thumb.appendChild(remove);
        thumbsEl.appendChild(thumb);
      });

      // buttons
      const count = selected.length;
      btnNext.textContent = `다음 ${count}/${MAX_SELECT}`;
      btnNext.disabled = count === 0;
      btnResetTop.disabled = count === 0;
    };

    // Revoke the object URLs backing a photos[] entry.
    const revokeMedia = (p) => {
      if (p.url) URL.revokeObjectURL(p.url);
      if (p.originalUrl && p.originalUrl !== p.url) URL.revokeObjectURL(p.originalUrl);
    };

    // File type detection — iOS sometimes hands us a file with an empty MIME string,
    // so fall back to extension matching when `type` is missing.
    const isVideoFile = (f) =>
      (f.type && f.type.startsWith('video/')) ||
      /\.(mp4|mov|m4v|webm|avi|mkv|3gp)$/i.test(f.name || '');
    const isImageFile = (f) =>
      (f.type && f.type.startsWith('image/')) ||
      /\.(jpg|jpeg|png|gif|webp|heic|heif|bmp)$/i.test(f.name || '');

    // Load files from <input type="file"> into photos[] and rebuild the picker.
    // Supports both images and videos (videos get a first-frame thumbnail).
    // `append=true` keeps existing photos/selection and adds new ones at the end.
    const loadPhotoFiles = async (fileList, append = false) => {
      const files = Array.from(fileList || []);
      if (files.length === 0) return;
      if (!append) {
        photos.forEach(revokeMedia);
        photos.length = 0;
        selected.length = 0;
      }

      loadingBarEl.removeAttribute('hidden');
      let thumbFailures = [];
      let firstError = '';
      try {
        for (const f of files) {
          if (isVideoFile(f)) {
            try {
              const { thumbUrl, originalUrl, duration } = await generateVideoThumbnail(f);
              photos.push({ url: thumbUrl, originalUrl, name: f.name, type: 'video', duration });
            } catch (err) {
              console.warn('video thumbnail failed for', f.name, err);
              thumbFailures.push(f.name);
              if (!firstError) firstError = err && err.message ? err.message : String(err);
              // Still include the video with a placeholder thumbnail — the file is
              // there, it just didn't render a frame preview.
              const url = URL.createObjectURL(f);
              photos.push({
                url: VIDEO_FALLBACK_THUMB,
                originalUrl: url,
                name: f.name,
                type: 'video',
                duration: null,
              });
            }
          } else if (isImageFile(f)) {
            const url = URL.createObjectURL(f);
            photos.push({ url, originalUrl: url, name: f.name, type: 'image' });
          } else {
            console.warn('skipped file of unsupported type', f.name, f.type);
          }
        }
      } finally {
        loadingBarEl.setAttribute('hidden', '');
      }

      if (thumbFailures.length) {
        showToast(`썸네일 실패 ${thumbFailures.length}개 · ${firstError.slice(0, 40)}`);
      }
      buildPicker();
      render();
    };
    photoInput.addEventListener('change', (e) => {
      const mode = e.target.dataset.mode;
      loadPhotoFiles(e.target.files, mode === 'append');
      delete e.target.dataset.mode;
      e.target.value = '';
    });

    // Page navigation — only one page visible at a time.
    const pages = { home: pageHome, edit: pageEdit, result: pageResult };
    let currentPage = 'home';
    const goTo = (name) => {
      if (!pages[name]) return;
      // Leaving the result page? Dismiss the textedit modal if it's up.
      if (currentPage === 'result' && name !== 'result') hideModal(texteditOverlay);
      Object.entries(pages).forEach(([k, el]) => {
        if (k === name) el.removeAttribute('hidden');
        else el.setAttribute('hidden', '');
      });
      currentPage = name;
      // Auto-open the device photo picker when entering edit with no photos.
      // Must happen in the same user-gesture turn as the button tap for iOS to allow it.
      if (name === 'edit' && photos.length === 0) {
        photoInput.click();
      }
    };

    // Modal helpers — only used by textedit.
    const showModal = (el) => {
      el.removeAttribute('hidden');
      el.classList.add('is-open');
      el.style.display = 'flex';
    };
    const hideModal = (el) => {
      el.classList.remove('is-open');
      el.style.display = '';
      el.setAttribute('hidden', '');
    };

    // Full reset — wipe loaded photos/videos and selections.
    const resetEditState = () => {
      photos.forEach(revokeMedia);
      photos.length = 0;
      selected.length = 0;
      buildPicker();
      render();
    };

    btnStart.addEventListener('click', () => goTo('edit'));
    btnEditClose.addEventListener('click', () => {
      resetEditState();
      goTo('home');
    });
    btnResetTop.addEventListener('click', () => {
      if (selected.length === 0) return;
      selected.length = 0;
      render();
    });
    btnNext.addEventListener('click', () => {
      if (selected.length === 0) return;
      goTo('result');
    });
    btnClose.addEventListener('click', () => goTo('edit'));

    // Toast with check-mark draw animation.
    let toastHideTimer = null;
    let toastRemoveTimer = null;
    const showToast = (msg = '저장 완료') => {
      toastTextEl.textContent = msg;
      clearTimeout(toastHideTimer);
      clearTimeout(toastRemoveTimer);
      toastEl.classList.remove('is-open');
      toastEl.removeAttribute('hidden');
      // Force a reflow so the animation restarts on repeat triggers
      void toastEl.offsetWidth;
      toastEl.classList.add('is-open');
      toastHideTimer = setTimeout(() => {
        toastEl.classList.remove('is-open');
        toastRemoveTimer = setTimeout(() => toastEl.setAttribute('hidden', ''), 400);
      }, 2200);
    };

    const TARGET_WIDTH = 650;
    const SOURCE_WIDTH = 393;
    const SOURCE_HEIGHT = 522;
    const SCALE_OUT = TARGET_WIDTH / SOURCE_WIDTH;
    const OUTPUT_HEIGHT = Math.round(SOURCE_HEIGHT * SCALE_OUT);

    // Share / anchor-download a Blob as a given file name.
    const saveBlob = async (blob, fileName) => {
      const file = new File([blob], fileName, { type: blob.type });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'MaxiEdit' });
          return true;
        } catch (err) {
          if (err && err.name === 'AbortError') return false; // user cancelled
          // other errors → fall through to anchor download
        }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      return true;
    };

    const tsNow = () => new Date().toISOString().replace(/[-:]/g, '').slice(0, 15);

    // Capture #page-result .full-image as a PNG at 650px wide.
    const capturePng = async () => {
      if (typeof html2canvas === 'undefined') throw new Error('html2canvas unavailable');
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      const fullImage = document.querySelector('#page-result .full-image');
      if (!fullImage) throw new Error('full-image not found');
      const canvas = await html2canvas(fullImage, {
        scale: SCALE_OUT,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
      });
      return await new Promise((resolve, reject) => {
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('toBlob failed')), 'image/png');
      });
    };

    // Draw the full_image layout onto an arbitrary canvas context (used for MP4 frames).
    const drawImageCover = (ctx, img, x, y, w, h) => {
      const iw = img.videoWidth || img.naturalWidth || img.width;
      const ih = img.videoHeight || img.naturalHeight || img.height;
      if (!iw || !ih) return;
      const ratio = Math.max(w / iw, h / ih);
      const dw = iw * ratio;
      const dh = ih * ratio;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      try { ctx.drawImage(img, dx, dy, dw, dh); } catch {}
      ctx.restore();
    };
    const drawFullImageFrame = (ctx, w, h, slots) => {
      const s = w / SOURCE_WIDTH;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);

      const padX = 15 * s;
      const topPad = 15 * s;
      const rowGap = 31 * s;
      const slotH = 86 * s;
      const labelSize = 9 * s;
      const labelGap = 5 * s;
      const cellW = (w - 2 * padX) / 3;
      const rowStride = slotH + labelGap + labelSize + rowGap;

      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const idx = r * 3 + c;
          const x = padX + c * cellW;
          const y = topPad + r * rowStride;
          const slot = slots[idx];
          if (slot && slot.type === 'image' && slot.img) {
            drawImageCover(ctx, slot.img, x, y, cellW, slotH);
          } else if (slot && slot.type === 'video' && slot.videoEl) {
            drawImageCover(ctx, slot.videoEl, x, y, cellW, slotH);
          } else {
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = SLOT_COLORS[idx];
            ctx.fillRect(x, y, cellW, slotH);
            ctx.globalAlpha = 1;
          }
          ctx.fillStyle = '#000';
          ctx.font = `700 ${labelSize}px "Nanum Myeongjo", serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(`(${idx + 1})`, x + cellW / 2, y + slotH + labelGap);
        }
      }

      // Textarea legend (y=448 in source coordinates)
      const textY = 448 * s;
      const textSize = 8 * s;
      const lineH = 11 * s;
      ctx.font = `800 ${textSize}px "Nanum Myeongjo", serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#000';
      const colX1 = 13 * s;
      const colX2 = (13 + 91 + 17) * s;
      for (let i = 0; i < 9; i++) {
        const x = i < 4 ? colX1 : colX2;
        const row = i < 4 ? i : i - 4;
        ctx.fillText(`(${i + 1}) ${textLabels[i]}`, x, textY + row * lineH);
      }
    };

    const pickRecorderMime = () => {
      if (typeof MediaRecorder === 'undefined') return null;
      const candidates = [
        'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
        'video/mp4;codecs=avc1.42E01E',
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm',
      ];
      return candidates.find((m) => { try { return MediaRecorder.isTypeSupported(m); } catch { return false; } }) || null;
    };

    // Render an MP4 (or webm fallback) of the full_image playing video slots for 2s.
    const captureMp4 = async () => {
      if (typeof MediaRecorder === 'undefined' || !HTMLCanvasElement.prototype.captureStream) {
        throw new Error('MediaRecorder/captureStream not supported');
      }
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      const mime = pickRecorderMime();
      if (!mime) throw new Error('no recorder codec');

      // Prepare slot resources.
      const slots = [];
      for (let i = 0; i < 9; i++) {
        const photoIdx = selected[i];
        const photo = photoIdx !== undefined ? photos[photoIdx] : null;
        if (!photo) { slots.push(null); continue; }
        if (photo.type === 'image') {
          const img = new Image();
          img.src = photo.url;
          try { await img.decode(); } catch {}
          slots.push({ type: 'image', img });
        } else if (photo.type === 'video' && photo.originalUrl) {
          const v = document.createElement('video');
          v.src = photo.originalUrl;
          v.muted = true;
          v.defaultMuted = true;
          v.playsInline = true;
          v.setAttribute('muted', '');
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.preload = 'auto';
          v.loop = true;
          v.style.cssText = 'position:fixed;top:0;left:0;width:64px;height:64px;opacity:0.001;pointer-events:none;z-index:-9999;';
          document.body.appendChild(v);
          await new Promise((res) => {
            const done = () => res();
            v.addEventListener('loadeddata', done, { once: true });
            v.addEventListener('error', done, { once: true });
            setTimeout(done, 3000);
          });
          v.currentTime = 0;
          try { await v.play(); } catch {}
          slots.push({ type: 'video', videoEl: v });
        } else {
          slots.push(null);
        }
      }

      // Canvas + recorder setup.
      const canvas = document.createElement('canvas');
      canvas.width = TARGET_WIDTH;
      canvas.height = OUTPUT_HEIGHT;
      const ctx = canvas.getContext('2d');
      // Draw an initial frame before starting the recorder so chunk 0 isn't blank.
      drawFullImageFrame(ctx, canvas.width, canvas.height, slots);

      const stream = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream, { mimeType: mime });
      const chunks = [];
      recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };

      const cleanup = () => {
        slots.forEach((s) => {
          if (s && s.type === 'video') {
            try { s.videoEl.pause(); } catch {}
            if (s.videoEl.parentNode) s.videoEl.parentNode.removeChild(s.videoEl);
          }
        });
      };

      recorder.start();
      const startT = performance.now();

      return await new Promise((resolve, reject) => {
        recorder.onerror = (e) => { cleanup(); reject(new Error('recorder error')); };
        recorder.onstop = () => {
          cleanup();
          const blob = new Blob(chunks, { type: mime });
          resolve({ blob, mime });
        };

        const draw = () => {
          const elapsed = (performance.now() - startT) / 1000;
          slots.forEach((s) => {
            if (s && s.type === 'video' && s.videoEl.currentTime >= VIDEO_CLIP_SECONDS) {
              s.videoEl.currentTime = 0;
            }
          });
          drawFullImageFrame(ctx, canvas.width, canvas.height, slots);
          if (elapsed < VIDEO_CLIP_SECONDS) {
            requestAnimationFrame(draw);
          } else {
            try { recorder.stop(); } catch (err) { cleanup(); reject(err); }
          }
        };
        requestAnimationFrame(draw);
      });
    };

    const downloadPng = async () => {
      btnDownload.disabled = true;
      loadingBarEl.removeAttribute('hidden');
      try {
        const blob = await capturePng();
        const ok = await saveBlob(blob, `maxiedit_${tsNow()}.png`);
        if (ok) showToast('저장 완료');
      } catch (err) {
        console.error(err);
        alert('이미지 생성에 실패했습니다.');
      } finally {
        loadingBarEl.setAttribute('hidden', '');
        btnDownload.disabled = false;
      }
    };

    const downloadMp4 = async () => {
      btnDownload.disabled = true;
      loadingBarEl.removeAttribute('hidden');
      try {
        const { blob, mime } = await captureMp4();
        const ext = mime.startsWith('video/mp4') ? 'mp4' : 'webm';
        const ok = await saveBlob(blob, `maxiedit_${tsNow()}.${ext}`);
        if (ok) showToast('저장 완료');
      } catch (err) {
        console.error(err);
        alert('영상 생성에 실패했습니다.\n' + (err.message || err));
      } finally {
        loadingBarEl.setAttribute('hidden', '');
        btnDownload.disabled = false;
      }
    };

    // Download button: if any selected item is a video, ask the user which format.
    const downloadModal = document.getElementById('download-modal');
    const btnDownloadPng = document.getElementById('btn-download-png');
    const btnDownloadMp4 = document.getElementById('btn-download-mp4');
    const btnDownloadCancel = document.getElementById('btn-download-cancel');
    btnDownload.addEventListener('click', () => {
      const hasVideo = selected.some((i) => photos[i] && photos[i].type === 'video');
      if (!hasVideo) { downloadPng(); return; }
      showModal(downloadModal);
    });
    btnDownloadPng.addEventListener('click', () => { hideModal(downloadModal); downloadPng(); });
    btnDownloadMp4.addEventListener('click', () => { hideModal(downloadModal); downloadMp4(); });
    btnDownloadCancel.addEventListener('click', () => hideModal(downloadModal));
    downloadModal.addEventListener('click', (e) => { if (e.target === downloadModal) hideModal(downloadModal); });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      // Only the textedit modal responds to Escape; pages have explicit nav.
      if (texteditOverlay.classList.contains('is-open')) closeTextedit();
    });

    document.querySelectorAll('.cat-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.cat-tab').forEach((t) => t.classList.remove('is-active'));
        tab.classList.add('is-active');
      });
    });

    const renderTextareas = () => {
      textareaEls.forEach((ta) => {
        if (!ta) return;
        ta.innerHTML = '';
        const leftCol = document.createElement('div');
        const rightCol = document.createElement('div');
        for (let i = 0; i < 9; i++) {
          const p = document.createElement('p');
          p.textContent = `(${i + 1}) ${textLabels[i]}`;
          (i < 4 ? leftCol : rightCol).appendChild(p);
        }
        ta.appendChild(leftCol);
        ta.appendChild(rightCol);
      });
    };

    const openTextedit = () => {
      texteditList.innerHTML = '';
      textLabels.forEach((label, i) => {
        const row = document.createElement('div');
        row.className = 'textedit-row';
        const num = document.createElement('span');
        num.className = 'textedit-num';
        num.textContent = `(${i + 1})`;
        const input = document.createElement('input');
        input.className = 'textedit-input';
        input.type = 'text';
        input.value = label;
        input.dataset.index = String(i);
        input.setAttribute('autocomplete', 'off');
        input.setAttribute('autocorrect', 'off');
        input.setAttribute('autocapitalize', 'off');
        row.appendChild(num);
        row.appendChild(input);
        texteditList.appendChild(row);
      });
      showModal(texteditOverlay);
    };

    const closeTextedit = () => hideModal(texteditOverlay);

    const confirmTextedit = () => {
      texteditList.querySelectorAll('.textedit-input').forEach((input) => {
        const idx = Number(input.dataset.index);
        textLabels[idx] = input.value;
      });
      renderTextareas();
      closeTextedit();
    };

    btnTextTool.addEventListener('click', openTextedit);
    btnTexteditCancel.addEventListener('click', closeTextedit);
    btnTexteditConfirm.addEventListener('click', confirmTextedit);
    texteditOverlay.addEventListener('click', (e) => {
      if (e.target === texteditOverlay) closeTextedit();
    });

    buildResultStyleGrid(previewGridEl);
    buildResultStyleGrid(resultGridEl);
    buildPicker();
    renderTextareas();
    render();

    // Long-press drag-reorder for selected thumbs
    if (typeof Sortable !== 'undefined') {
      Sortable.create(thumbsEl, {
        delay: 300,
        delayOnTouchOnly: false,
        animation: 160,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        filter: '.thumb-remove',
        preventOnFilter: true,
        onEnd(evt) {
          if (evt.oldIndex === evt.newIndex) return;
          const [moved] = selected.splice(evt.oldIndex, 1);
          selected.splice(evt.newIndex, 0, moved);
          render();
        }
      });
    }
  </script>
</body>
</html>
